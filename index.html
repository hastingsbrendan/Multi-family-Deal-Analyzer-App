// Reads deals for the currently authenticated user (RLS enforces user_id = auth.uid())
async function sbRead() {
  const { data: { user } } = await sbClient.auth.getUser();
  if (!user) throw new Error("Not authenticated");
  const { data, error } = await sbClient
    .from("deals")
    .select("data, prefs, updated_at")
    .eq("user_id", user.id)
    .order("updated_at", { ascending: false })
    .limit(1)
    .maybeSingle();
  if (error) throw new Error(`Read: ${error.message}`);
  return { data: data?.data || [], prefs: data?.prefs || null, updated_at: data?.updated_at || null };
}

async function sbWritePrefs(prefs) {
  const { data: { user } } = await sbClient.auth.getUser();
  if (!user) throw new Error("Not authenticated");
  const { error: updateErr } = await sbClient
    .from("deals")
    .update({ prefs, updated_at: new Date().toISOString() })
    .eq("user_id", user.id);
  if (updateErr) {
    const { error: insertErr } = await sbClient
      .from("deals")
      .insert({ user_id: user.id, data: [], prefs, updated_at: new Date().toISOString() });
    if (insertErr) throw new Error(`WritePrefs: ${insertErr.message}`);
  }
}

// Writes deals for the current user — upserts on user_id (one row per user)
async function sbWrite(deals) {
  const { data: { user } } = await sbClient.auth.getUser();
  if (!user) throw new Error("Not authenticated");
  // Try update first (existing user), then insert (new user)
  const { error: updateErr } = await sbClient
    .from("deals")
    .update({ data: deals, updated_at: new Date().toISOString() })
    .eq("user_id", user.id);
  if (updateErr) {
    // Row doesn't exist yet — insert for new user
    const { error: insertErr } = await sbClient
      .from("deals")
      .insert({ user_id: user.id, data: deals, updated_at: new Date().toISOString() });
    if (insertErr) throw new Error(`Write: ${insertErr.message}`);
  }
}

// Upload photo to Supabase Storage — path scoped to user folder
async function sbUploadPhoto(dealId, file) {
  const { data: { user } } = await sbClient.auth.getUser();
  const ext  = file.name.split(".").pop();
  const path = `${user?.id || "anon"}/${dealId}/${Date.now()}.${ext}`;
  const { data: { session } } = await sbClient.auth.getSession();
  const token = session?.access_token || SB_ANON_KEY;
  const res = await fetch(`${SB_URL}/storage/v1/object/${SB_BUCKET}/${path}`, {
    method: "POST",
    headers: { "apikey": SB_ANON_KEY, "Authorization": "Bearer " + token, "Content-Type": file.type, "x-upsert": "true" },
    body: file,
  });
  if (!res.ok) { const b = await res.text().catch(()=>""); throw new Error(`Upload ${res.status}: ${b}`); }
  return `${SB_URL}/storage/v1/object/public/${SB_BUCKET}/${path}`;
}

async function sbDeletePhoto(url) {
  const path = url.split(`/object/public/${SB_BUCKET}/`)[1];
  if (!path) return;
  const { data: { session } } = await sbClient.auth.getSession();
  const token = session?.access_token || SB_ANON_KEY;
  await fetch(`${SB_URL}/storage/v1/object/${SB_BUCKET}/${path}`, {
    method: "DELETE",
    headers: { "apikey": SB_ANON_KEY, "Authorization": "Bearer " + token },
  });
}

function useIsMobile() {
  const [m, setM] = useState(window.innerWidth < 768);
  useEffect(() => { const fn = () => setM(window.innerWidth < 768); window.addEventListener('resize',fn); return ()=>window.removeEventListener('resize',fn); }, []);
  return m;
}

function useOnlineStatus() {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const on = () => setOnline(true);
    const off = () => setOnline(false);
    window.addEventListener('online', on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online',on); window.removeEventListener('offline',off); };
  }, []);
  return online;
}

async function sbGetMyGroups() {
  const { data: { user } } = await sbClient.auth.getUser();
  if (!user) return [];
  const { data: memberships } = await sbClient
    .from('group_members').select('group_id, role, status').eq('user_id', user.id);
  if (!memberships?.length) return [];
  const groupIds = memberships.map(m => m.group_id);
  const { data: groups } = await sbClient
    .from('groups').select('id, name, description, created_by, created_at').in('id', groupIds);
  return (groups || []).map(g => ({
    ...g,
    role:   memberships.find(m => m.group_id === g.id)?.role   || 'Viewer',
    status: memberships.find(m => m.group_id === g.id)?.status || 'active',
  }));
}

// ─── FINANCIAL ENGINE ─────────────────────────────────────────────────────────
function resolveExpenses(a, grossRentYear0) {
  const modes = a.expenseModes || {};
  const val = (vk, pk) => (modes[vk]==="pct") ? grossRentYear0*((+a.expenses[pk]||0)/100) : (+a.expenses[vk]||0);
  const mgmt = a.selfManage ? 0 : val("propertyMgmt","propertyMgmtPct");
  const pt=val("propertyTax","propertyTaxPct"), ins=val("insurance","insurancePct");
  const maint=val("maintenance","maintenancePct"), capex=val("capex","capexPct"), util=val("utilities","utilitiesPct");
  return { propertyTax:pt, insurance:ins, maintenance:maint, capex, propertyMgmt:mgmt, utilities:util, total:pt+ins+maint+capex+mgmt+util };
}

function calcDeal(deal) {
  if (!deal?.assumptions) return {};
  const a = deal.assumptions;
  const pp=+a.purchasePrice||0, dpPct=(+a.downPaymentPct||25)/100, dp=pp*dpPct;
  const closingCostsTotal=Object.values(a.closingCosts).reduce((s,v)=>s+(+v||0),0);
  const totalCash=dp+closingCostsTotal-(+a.sellerConcessions||0);
  const loanAmt=pp-dp, rate=(+a.interestRate||7)/100/12, n=(+a.amortYears||30)*12;
  const monthlyPayment=loanAmt>0&&rate>0?loanAmt*(rate*Math.pow(1+rate,n))/(Math.pow(1+rate,n)-1):loanAmt/n;
  const annualDebtService=monthlyPayment*12;
  const grossRentYear0=a.units.slice(0,a.numUnits).reduce((s,u)=>s+(+(u.rent||u.listedRent)||0)*12,0);
  // Owner-occupancy: one unit not rented for ownerOccupancyYears years
  const ooEnabled=!!a.ownerOccupied;
  const ooUnit=ooEnabled?Math.min(+a.ownerUnit||0,a.numUnits-1):null;
  const ooYears=ooEnabled?Math.max(1,+a.ownerOccupancyYears||2):0;
  const ooAnnualRentLost=ooEnabled?(+(a.units[ooUnit]?.rent||a.units[ooUnit]?.listedRent)||0)*12:0;
  const ooAnnualUtilities=ooEnabled?(+a.ownerUseUtilities||0):0;
  const ooAltRentMonthly=ooEnabled?(+a.alternativeRent||0):0;
  const vacRate=(+a.vacancyRate||0)/100, rentGrowth=(+a.rentGrowth||0)/100;
  const expGrowth=(+a.expenseGrowth||0)/100, appRate=(+a.appreciationRate||0)/100;
  const baseExp=resolveExpenses(a,grossRentYear0), baseExpenses=baseExp.total;
  const years=[];
  let balance=loanAmt;
  const refiEnabled=a.refi?.enabled&&+a.refi?.year>=1&&+a.refi?.year<=9;
  const refiYear=refiEnabled?+a.refi.year:null;
  const refiRate=refiEnabled?(+a.refi.newRate||7)/100/12:null;
  const refiLTV=refiEnabled?(+a.refi.newLTV||75)/100:null;
  let refiCashOut=0, currentMonthlyPayment=monthlyPayment, currentAnnualDebtService=annualDebtService;
  const va=a.valueAdd||{}, vaEnabled=!!va.enabled;
  const vaCompletionYr=vaEnabled?Math.max(1,Math.min(10,+va.completionYear||3)):null;
  const vaReModelCost=vaEnabled?(+va.reModelCost||0):0;
  const vaRentBump=vaEnabled?(+va.rentBumpPerUnit||0)*Math.min(+va.unitsRenovated||0,a.numUnits)*12:0;
  const totalCashWithVA=totalCash+vaReModelCost;
  for(let yr=1;yr<=10;yr++){
    let refiEvent=null;
    if(refiEnabled&&yr===refiYear){
      const pv=pp*Math.pow(1+appRate,yr-1), newLoanAmt=pv*refiLTV;
      refiCashOut=Math.max(0,newLoanAmt-balance);
      const refiN=(+a.amortYears||30)*12;
      const newMonthly=newLoanAmt>0&&refiRate>0?newLoanAmt*(refiRate*Math.pow(1+refiRate,refiN))/(Math.pow(1+refiRate,refiN)-1):newLoanAmt/refiN;
      balance=newLoanAmt; currentMonthlyPayment=newMonthly; currentAnnualDebtService=newMonthly*12;
      refiEvent={cashOut:refiCashOut,newLoanAmt,newRate:a.refi.newRate};
    }
    const vaRentLiftThisYr=vaEnabled&&yr>=vaCompletionYr?vaRentBump:0;
    const ooRentLostThisYr=ooEnabled&&yr<=ooYears?ooAnnualRentLost:0;
    const ooUtilitiesThisYr=ooEnabled&&yr<=ooYears?ooAnnualUtilities*Math.pow(1+(+a.expenseGrowth||0)/100,yr-1):0;
    const grossRent=(grossRentYear0+vaRentLiftThisYr)*Math.pow(1+rentGrowth,yr-1);
    const vacancyLoss=grossRent*vacRate, egi=grossRent-vacancyLoss;
    const mult=Math.pow(1+expGrowth,yr-1);
    const expBreakdown={propertyTax:baseExp.propertyTax*mult,insurance:baseExp.insurance*mult,maintenance:baseExp.maintenance*mult,capex:baseExp.capex*mult,propertyMgmt:baseExp.propertyMgmt*mult,utilities:baseExp.utilities*mult};
    const expenses=baseExpenses*mult, noi=egi-expenses;
    let principal=0,interest=0,newBalance=balance;
    if(balance>0){for(let m=0;m<12;m++){const intPay=newBalance*(refiEnabled&&yr>=refiYear?refiRate:rate);const prinPay=currentMonthlyPayment-intPay;interest+=intPay;principal+=prinPay;newBalance-=prinPay;}}
    balance=newBalance;
    const vaRemodelOutflow=yr===1?vaReModelCost/2:yr===2?vaReModelCost/2:0;
    const cashFlow=noi-currentAnnualDebtService+(refiEvent?refiEvent.cashOut:0)-vaRemodelOutflow;
    const monthlyCashFlow=cashFlow/12;
    const cocReturn=totalCashWithVA>0?(noi-currentAnnualDebtService)/totalCashWithVA:0;
    const capRate=pp>0?noi/pp:0, dscr=currentAnnualDebtService>0?noi/currentAnnualDebtService:0;
    const annualDepreciation=(pp*0.8)/27.5, taxableIncome=noi-interest-annualDepreciation;
    const qbi=taxableIncome>0?taxableIncome*0.2:0, federalTaxable=taxableIncome-qbi;
    const bracketRate=(+a.taxBracket||22)/100, taxEffect=federalTaxable*bracketRate;
    const afterTaxCashFlow=(noi-currentAnnualDebtService)-taxEffect+(refiEvent?refiEvent.cashOut:0)-vaRemodelOutflow;
    const baseCapRate=grossRentYear0*(1-vacRate)-baseExpenses>0&&pp>0?(grossRentYear0*(1-vacRate)-baseExpenses)/pp:0.06;
    const vaImpliedValueLift=vaEnabled&&yr>=vaCompletionYr&&baseCapRate>0?(vaRentBump*(1-vacRate))/baseCapRate:0;
    const propertyValue=pp*Math.pow(1+appRate,yr)+vaImpliedValueLift;
    const ooCashFlow=ooEnabled&&yr<=ooYears?cashFlow-ooRentLostThisYr-ooUtilitiesThisYr:null;
    const ooMonthlyCashFlow=ooCashFlow!==null?ooCashFlow/12:null;
    years.push({yr,grossRent,vacancyLoss,egi,expenses,expBreakdown,noi,debtService:currentAnnualDebtService,cashFlow,monthlyCashFlow,cocReturn,capRate,dscr,principal,interest,balance:newBalance,depreciation:annualDepreciation,taxableIncome,qbi,taxEffect,afterTaxCashFlow,propertyValue,equity:propertyValue-newBalance,appreciationGain:propertyValue-pp,principalPaydown:loanAmt-newBalance,refiEvent,vaRemodelOutflow,vaRentLift:vaRentLiftThisYr,ooRentLost:ooRentLostThisYr,ooUtilities:ooUtilitiesThisYr,ooCashFlow,ooMonthlyCashFlow});
  }
  const exitValue=years[9]?.propertyValue||pp*Math.pow(1+appRate,10);
  const capitalGains=exitValue-pp, capitalGainsTax=capitalGains*0.15;
  const netProceeds=exitValue-(years[9]?.balance||0)-capitalGainsTax;
  const irrCFs=[-totalCashWithVA,...years.map(y=>y.cashFlow)]; irrCFs[10]+=netProceeds;
  let irr=0.1;
  for(let i=0;i<100;i++){let npv=0,dnpv=0;irrCFs.forEach((cf,t)=>{npv+=cf/Math.pow(1+irr,t);dnpv-=t*cf/Math.pow(1+irr,t+1);});if(Math.abs(npv)<0.01)break;irr-=npv/dnpv;}
  const equityMultiple=totalCashWithVA>0?(years.reduce((s,y)=>s+y.cashFlow,0)+netProceeds)/totalCashWithVA:0;
  const breakEvenOccupancy=grossRentYear0>0?(annualDebtService+baseExpenses)/grossRentYear0:0;
  let irrWithoutVA=irr,irrWithVA=irr;
  if(vaEnabled){const d2=JSON.parse(JSON.stringify(deal));d2.assumptions.valueAdd={...va,enabled:false};irrWithoutVA=calcDeal(d2).irr;irrWithVA=irr;}
  return {totalCash:totalCashWithVA,totalCashBase:totalCash,loanAmt,monthlyPayment,annualDebtService,grossRentYear0,baseExpenses,noi:years[0]?.noi||0,cocReturn:years[0]?.cocReturn||0,capRate:years[0]?.capRate||0,dscr:years[0]?.dscr||0,irr,equityMultiple,breakEvenOccupancy,exitValue,netProceeds,capitalGainsTax,years,refiCashOut,refiYear:refiEnabled?refiYear:null,vaEnabled,vaReModelCost,vaRentBump,vaCompletionYr,irrWithoutVA,irrWithVA,ooEnabled,ooUnit,ooYears,ooAnnualRentLost,ooAltRentMonthly};
}

function calcSensitivity(deal) {
  const base=calcDeal(deal);
  const deltas=[{label:"Rent",unit:"±10%",key:"rent",range:[-0.1,0.1]},{label:"Vacancy",unit:"±5pp",key:"vacancy",range:[-5,5]},{label:"Purchase Price",unit:"±10%",key:"price",range:[-0.1,0.1]},{label:"Interest Rate",unit:"±1%",key:"rate",range:[-1,1]},{label:"Appreciation",unit:"±1%",key:"appr",range:[-1,1]}];
  return deltas.map(d=>{
    const [low,high]=d.range.map(delta=>{
      const m=JSON.parse(JSON.stringify(deal));
      if(d.key==="rent")m.assumptions.units=m.assumptions.units.map(u=>({...u,rent:+u.rent*(1+delta)}));
      if(d.key==="vacancy")m.assumptions.vacancyRate=+m.assumptions.vacancyRate+delta;
      if(d.key==="price")m.assumptions.purchasePrice=+m.assumptions.purchasePrice*(1+delta);
      if(d.key==="rate")m.assumptions.interestRate=+m.assumptions.interestRate+delta;
      if(d.key==="appr")m.assumptions.appreciationRate=+m.assumptions.appreciationRate+delta;
      const r=calcDeal(m);return{irr:r.irr,coc:r.cocReturn};
    });
    return{label:d.label,unit:d.unit,irrLowDelta:low.irr-base.irr,irrHighDelta:high.irr-base.irr,cocLowDelta:low.coc-base.cocReturn,cocHighDelta:high.coc-base.cocReturn,irrLowAbs:low.irr,irrHighAbs:high.irr,cocLowAbs:low.coc,cocHighAbs:high.coc};
  });
}

// Format a number with commas for display; suppress zero (show blank instead)
function fmtInputDisplay(value) {
  const n = parseFloat(String(value).replace(/,/g,""));
  if (isNaN(n) || n === 0) return "";
  // If it's a whole number show no decimal; otherwise preserve up to 2 decimals
  return Number.isInteger(n) ? n.toLocaleString() : parseFloat(n.toFixed(2)).toLocaleString();
}
// Strip commas before passing back to state
function parseInputValue(str) {
  return str.replace(/,/g,"");
}

function InputRow({label,value,onChange,type="number",prefix,suffix,source,onSourceChange}){
  const isMobile=useIsMobile();
  const [showSrc,setShowSrc]=useState(false);
  const [focused,setFocused]=useState(false);
  // While focused show raw value; while blurred show formatted with commas (and blank for 0)
  const isNumeric = type==="number";
  const displayVal = isNumeric
    ? (focused ? (String(value)==="0"||value===0?"":String(value).replace(/,/g,"")) : fmtInputDisplay(value))
    : value;
  const handleChange = e => onChange(isNumeric ? parseInputValue(e.target.value) : e.target.value);
  const inputEl = (mobile) => (
    <input
      type="text"
      inputMode={isNumeric?"decimal":"text"}
      value={displayVal}
      onChange={handleChange}
      onFocus={()=>setFocused(true)}
      onBlur={()=>setFocused(false)}
      placeholder={isNumeric?"0":""}
      style={{...iSty,fontSize:mobile?14:14}}
    />
  );
  if(isMobile){return(<div style={{padding:"10px 0",borderBottom:"1px solid var(--border-faint)"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><label style={{fontSize:13,color:"var(--muted)",fontWeight:600}}>{label}</label>{onSourceChange&&<button onClick={()=>setShowSrc(v=>!v)} style={{background:"none",border:"1px solid var(--border-faint)",borderRadius:4,color:"var(--muted)",fontSize:10,padding:"2px 6px"}}>{showSrc?"hide":"+ src"}</button>}</div><div style={{display:"flex",alignItems:"center",gap:4}}>{prefix&&<span style={{fontSize:13,color:"var(--muted)",whiteSpace:"nowrap",flexShrink:0}}>{prefix}</span>}{inputEl(true)}{suffix&&<span style={{fontSize:12,color:"var(--muted)",whiteSpace:"nowrap",flexShrink:0,marginLeft:2}}>{suffix}</span>}</div>{showSrc&&onSourceChange&&<input type="text" placeholder="Source (optional)" value={source||""} onChange={e=>onSourceChange(e.target.value)} style={{...srcSty,marginTop:6}}/>}</div>);}
  return(<div style={{display:"grid",gridTemplateColumns:"200px 1fr 1fr",gap:8,alignItems:"center",padding:"5px 0",borderBottom:"1px solid var(--border-faint)"}}><label style={{fontSize:13,color:"var(--muted)",fontWeight:500}}>{label}</label><div style={{display:"flex",alignItems:"center",gap:4}}>{prefix&&<span style={{fontSize:13,color:"var(--muted)",whiteSpace:"nowrap"}}>{prefix}</span>}{inputEl(false)}{suffix&&<span style={{fontSize:13,color:"var(--muted)",whiteSpace:"nowrap"}}>{suffix}</span>}</div><input type="text" placeholder="Source (optional)" value={source||""} onChange={e=>onSourceChange&&onSourceChange(e.target.value)} style={srcSty}/></div>);
}

function UndoToast({message, onUndo, onDismiss}) {
  const [fading, setFading] = useState(false);
  useEffect(() => {
    const t1 = setTimeout(() => setFading(true), 4000);
    const t2 = setTimeout(() => onDismiss(), 5000);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);
  return (
    <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",zIndex:9999,display:"flex",alignItems:"center",gap:12,background:"#1f2937",border:"1px solid #374151",borderRadius:10,padding:"12px 16px",boxShadow:"0 8px 24px rgba(0,0,0,0.4)",animation:fading?"fadeOut 1s ease forwards":"slideIn 0.3s ease",whiteSpace:"nowrap"}}>

      <button onClick={onUndo} style={{background:"var(--accent)",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:800}}>Undo</button>
      <button onClick={onDismiss} style={{background:"none",border:"none",color:"#6b7280",fontSize:16,padding:"0 2px",lineHeight:1}}>✕</button>
    </div>
  );
}

  const fileRef = useRef();
  const photos = deal.photos || [];

  const handleUpload = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    setUploading(true);
    try {
      const urls = await Promise.all(files.map(f => sbUploadPhoto(deal.id, f)));
      onUpdate({ ...deal, photos: [...photos, ...urls] });
    } catch(err) {
      alert("Photo upload failed: " + err.message + "\n\nMake sure you created the 'deal-photos' storage bucket in Supabase with public access.");
    } finally {
      setUploading(false);
      e.target.value = "";
    }
  };

  const handleDelete = async (url) => {
    if (!confirm("Remove this photo?")) return;
    onUpdate({ ...deal, photos: photos.filter(p => p !== url) });
    sbDeletePhoto(url).catch(() => {});
  };

  return (
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:14,marginBottom:14}}>

          {uploading?"Uploading…":"📷 Add Photo"}

function parseAddressFromUrl(url) {
  try {
    const u = url.trim();
    // Zillow: /homedetails/123-main-st-chicago-il-60601/12345_zpid/
    const zillow = u.match(/zillow\.com\/homedetails\/([^/]+)/);
    if (zillow) return zillow[1].replace(/-zpid.*/, '').replace(/-/g, ' ').replace(/(\w{2})(\d{5})$/, '$1 $2').trim();
    // Redfin: /IL/Chicago/123-Main-St-60601/home/12345
    const redfin = u.match(/redfin\.com\/[A-Z]{2}\/[^/]+\/([^/]+)\/home/);
    if (redfin) return redfin[1].replace(/-/g, ' ').trim();
    // Realtor.com: /realestateandhomes-detail/123-Main-St_Chicago_IL_60601_M12345/
    const realtor = u.match(/realtor\.com\/realestateandhomes-detail\/([^_/]+_[^_/]+_[A-Z]{2}_\d{5})/);
    if (realtor) return realtor[1].replace(/_/g, ' ').trim();
    // If it doesn't look like a URL, treat as raw address
    if (!u.startsWith('http')) return u;
    return null;
  } catch(e) { return null; }
}

function PropertyLookupPanel({deal, onChange}) {
  const [input, setInput] = React.useState(deal.address||'');
  // Keep input in sync if address is updated from outside (e.g. typed on Summary tab)
  React.useEffect(() => {
    setInput(prev => prev === '' && deal.address ? deal.address : prev);
  }, [deal.address]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [preview, setPreview] = React.useState(null);
  const [open, setOpen] = React.useState(false);
  const isMobile = useIsMobile();

  const doLookup = async () => {
    if (!input.trim()) return;
    if (!RENTCAST_KEY) { setError('Add your Rentcast API key to the RENTCAST_KEY constant in the source file.'); return; }
    setLoading(true); setError(''); setPreview(null);
    try {
      const addr = parseAddressFromUrl(input.trim());
      if (!addr) { setError('Could not parse address from URL. Try pasting the address directly.'); setLoading(false); return; }

      const headers = { 'X-Api-Key': RENTCAST_KEY, 'Accept': 'application/json' };
      const encAddr = encodeURIComponent(addr);

      // Call property records endpoint
      const propRes = await fetch(`https://api.rentcast.io/v1/properties?address=${encAddr}&limit=1`, { headers });
      if (!propRes.ok) { const t = await propRes.text(); setError(`Rentcast error (${propRes.status}): ${t}`); setLoading(false); return; }
      const propData = await propRes.json();
      const prop = Array.isArray(propData) ? propData[0] : propData;

      if (!prop) { setError('No property found for that address. Try entering the address manually.'); setLoading(false); return; }

      // Call rent estimate endpoint
      // Build unique bedroom counts across configured units so each unit type gets an accurate estimate
      const numUnits = prop.bedrooms
        ? (((prop.propertyType||'').toLowerCase().includes('duplex') ? 2
          : (prop.propertyType||'').toLowerCase().includes('triplex') ? 3
          : (prop.propertyType||'').toLowerCase().includes('fourplex') ? 4 : 2))
        : 2;
      // Fetch one rent estimate per bedroom configuration; default to 2br if unknown
      const bedroomCounts = [];
      const bedsPerUnit = prop.bedrooms ? Math.round(prop.bedrooms / numUnits) : 2;
      for (let i = 0; i < Math.min(numUnits, 4); i++) bedroomCounts.push(bedsPerUnit);
      const uniqueBeds = [...new Set(bedroomCounts)];
      const rentByBeds = {};
      for (const beds of uniqueBeds) {
        const r = await fetch(`https://api.rentcast.io/v1/avm/rent/long-term?address=${encAddr}&bedrooms=${beds}&propertyType=Apartment`, { headers });
        if (r.ok) rentByBeds[beds] = await r.json();
      }
      // Also fetch whole-property estimate as fallback
      const rentRes = await fetch(`https://api.rentcast.io/v1/avm/rent/long-term?address=${encAddr}`, { headers });
      const rentData = rentRes.ok ? await rentRes.json() : null;

      setPreview({ prop, rent: rentData, rentByBeds, bedsPerUnit, parsedAddr: addr });
    } catch(e) { setError('Network error: ' + e.message); }
    setLoading(false);
  };

  const applyPreview = () => {
    if (!preview) return;
    const { prop, rent } = preview;
    const d = JSON.parse(JSON.stringify(deal));
    const a = d.assumptions;

    // Address
    if (prop.formattedAddress) d.address = prop.formattedAddress;

    // Units — infer from bedrooms if propertyType is multi-family
    const propType = (prop.propertyType || '').toLowerCase();
    const isMF = propType.includes('multi') || propType.includes('duplex') || propType.includes('triplex') || propType.includes('fourplex');
    if (isMF) {
      const unitGuess = propType.includes('duplex') ? 2 : propType.includes('triplex') ? 3 : propType.includes('fourplex') ? 4 : prop.units || 2;
      a.numUnits = Math.min(4, Math.max(2, +unitGuess || 2));
    }

    // Property tax — Rentcast returns annual tax amount
    // propertyTaxes = actual annual tax bill (what we want)
    // taxAssessments[year].value = assessed property value (NOT the tax amount)
    if (prop.propertyTaxes) {
      const taxYears = Object.keys(prop.propertyTaxes).sort().reverse();
      if (taxYears.length > 0) {
        const annualTax = prop.propertyTaxes[taxYears[0]];
        if (annualTax) {
          a.expenses.propertyTax = Math.round(annualTax);
          a.expenseModes.propertyTax = 'value';
        }
      }
    }

    // Rent estimate — use per-bedroom estimates when available, fall back to whole-property estimate
    const { rentByBeds, bedsPerUnit } = preview;
    for (let i = 0; i < a.numUnits; i++) {
      if (!a.units[i]) a.units[i] = { rent: 0, listedRent: 0, rentcastRent: 0, rentSource: '' };
      // Try to get a bedroom-specific estimate for this unit
      const unitBeds = bedsPerUnit || 2;
      const rentSrc = (rentByBeds && rentByBeds[unitBeds]) ? rentByBeds[unitBeds] : rent;
      if (rentSrc && rentSrc.rent) {
        a.units[i].rentcastRent = Math.round(rentSrc.rent);
        const lo = rentSrc.rentRangeLow ? Math.round(rentSrc.rentRangeLow) : null;
        const hi = rentSrc.rentRangeHigh ? Math.round(rentSrc.rentRangeHigh) : null;
        if (lo && hi) a.units[i].rentcastRentRange = `$${lo.toLocaleString()}–$${hi.toLocaleString()}`;
        a.units[i].rentcastBeds = unitBeds;
      }
    }

    // Store property metadata for display
    // Resolve annual property tax from propertyTaxes field
    let annualTax = null;
    if (prop.propertyTaxes) {
      const taxYrs = Object.keys(prop.propertyTaxes).sort().reverse();
      if (taxYrs.length > 0) annualTax = prop.propertyTaxes[taxYrs[0]];
    }
    // Resolve assessed value from taxAssessments
    let assessedValue = prop.assessedValue || null;
    if (!assessedValue && prop.taxAssessments) {
      const assYrs = Object.keys(prop.taxAssessments).sort().reverse();
      if (assYrs.length > 0) assessedValue = prop.taxAssessments[assYrs[0]]?.value || null;
    }
    // Pre-populate Property Details fields from Rentcast
    if (prop.bedrooms != null)    a.beds            = prop.bedrooms;
    if (prop.bathrooms != null)   a.baths           = prop.bathrooms;
    if (prop.yearBuilt != null)   a.yearBuilt       = prop.yearBuilt;
    if (prop.squareFootage != null) a.sqftTotal     = prop.squareFootage;
    if (prop.lotSize != null)     a.lotSize         = prop.lotSize;
    if (annualTax != null)        a.annualPropertyTax = annualTax;
    a.rentcastData = {
      fetchedAt: new Date().toLocaleDateString(),
      bedsPerUnit: preview.bedsPerUnit || null,
      bedrooms: prop.bedrooms,
      bathrooms: prop.bathrooms,
      squareFootage: prop.squareFootage,
      lotSize: prop.lotSize,
      yearBuilt: prop.yearBuilt,
      propertyType: prop.propertyType,
      assessedValue: assessedValue,
      annualTax: annualTax,
      hoaFee: prop.hoa?.fee || null,
      lastSalePrice: prop.lastSalePrice,
      lastSaleDate: prop.lastSaleDate,
      rentEstimate: rent?.rent,
      rentEstimateLow: rent?.rentRangeLow,
      rentEstimateHigh: rent?.rentRangeHigh,
    };

    onChange(d);
    setPreview(null);
    setInput('');
    setOpen(false);
  };

  const pv = preview;
  const rc = pv?.prop;
  const rv = pv?.rent;

  return (
    <div style={{marginBottom:20,border:'2px solid var(--accent)',borderRadius:10,overflow:'hidden'}}>
      <div onClick={()=>setOpen(v=>!v)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'var(--accent)',cursor:'pointer',userSelect:'none'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:16}}>🔍</span>
          <span style={{fontWeight:800,fontSize:13,color:'#fff',letterSpacing:'0.04em'}}>AUTO-FILL FROM LISTING URL OR ADDRESS</span>
        </div>
        <span style={{color:'#fff',fontSize:12,opacity:0.8}}>{open ? '▲ collapse' : '▼ expand'}</span>
      </div>
      {open && (
        <div style={{padding:14,background:'var(--card)'}}>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>
            Paste a Zillow, Redfin, or Realtor.com listing URL — or type an address directly. Powered by Rentcast.
          </div>
          <div style={{display:'flex',gap:8,flexWrap:isMobile?'wrap':'nowrap'}}>
            <input
              value={input}
              onChange={e=>{setInput(e.target.value);setError('');}}
              onKeyDown={e=>e.key==='Enter'&&doLookup()}
              placeholder="https://www.zillow.com/homedetails/... or 123 Main St, Chicago IL 60601"
              style={{flex:1,background:'var(--input-bg)',border:'1px solid var(--border)',borderRadius:6,padding:'9px 12px',color:'var(--text)',fontSize:13,minWidth:0}}
            />
            <button
              onClick={doLookup}
              disabled={loading||!input.trim()}
              style={{background:loading?'var(--muted)':'var(--accent)',color:'#fff',border:'none',borderRadius:6,padding:'9px 18px',fontWeight:700,fontSize:13,cursor:loading?'not-allowed':'pointer',whiteSpace:'nowrap',flexShrink:0}}
            >
              {loading ? '⏳ Looking up…' : '🔍 Look Up'}
            </button>
          </div>

          {error && (
            <div style={{marginTop:10,padding:'8px 12px',background:'#FEE2E2',borderRadius:6,color:'#991B1B',fontSize:12}}>
              ⚠️ {error}
            </div>
          )}

          {!RENTCAST_KEY && (
            <div style={{marginTop:10,padding:'8px 12px',background:'#FEF3C7',borderRadius:6,color:'#92400E',fontSize:12}}>
              ⚠️ No API key set. Get a free key at <a href="https://app.rentcast.io/app/api" target="_blank" rel="noreferrer" style={{color:'#92400E',fontWeight:700}}>rentcast.io/app/api</a>, then paste it into the <code>RENTCAST_KEY</code> constant in this file.
            </div>
          )}

          {pv && (
            <div style={{marginTop:14,border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
              <div style={{background:'var(--table-head)',padding:'8px 12px',fontWeight:800,fontSize:12,color:'var(--accent)',letterSpacing:'0.06em'}}>
                📋 FOUND — REVIEW BEFORE APPLYING
              </div>
              <div style={{padding:12,display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:'6px 16px'}}>
                {[
                  ['Address', rc?.formattedAddress || pv.parsedAddr],
                  ['Property Type', rc?.propertyType || '—'],
                  ['Bedrooms / Baths', rc ? `${rc.bedrooms||'?'} bed / ${rc.bathrooms||'?'} bath` : '—'],
                  ['Sq Footage', rc?.squareFootage ? rc.squareFootage.toLocaleString()+' sq ft' : '—'],
                  ['Year Built', rc?.yearBuilt || '—'],
                  ['Assessed Value', rc?.assessedValue ? '$'+Math.round(rc.assessedValue).toLocaleString() : '—'],
                  ['Est. Annual Tax', rc?.propertyTaxes ? (()=>{const yrs=Object.keys(rc.propertyTaxes).sort().reverse();return yrs.length?'$'+Math.round(rc.propertyTaxes[yrs[0]]||0).toLocaleString():'—';})() : '—'],
                  ['Assessed Value', rc?.taxAssessments ? (()=>{const yrs=Object.keys(rc.taxAssessments).sort().reverse();return yrs.length?'$'+Math.round(rc.taxAssessments[yrs[0]].value||0).toLocaleString():'—';})() : '—'],
                  ['Rent Est. (whole property)', rv?.rent ? '$'+Math.round(rv.rent).toLocaleString()+'/mo' : '—'],
                  ['Rent Range', rv ? `$${Math.round(rv.rentRangeLow||0).toLocaleString()} – $${Math.round(rv.rentRangeHigh||0).toLocaleString()}/mo` : '—'],
                  ['Rent Est. (per unit / '+( pv.bedsPerUnit||2)+'br)', (pv.rentByBeds&&pv.rentByBeds[pv.bedsPerUnit||2]) ? '$'+Math.round(pv.rentByBeds[pv.bedsPerUnit||2].rent||0).toLocaleString()+'/mo' : '—'],
                ].map(([label,val])=>(
                  <div key={label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:'1px solid var(--border-faint)'}}>
                    <span style={{fontSize:12,color:'var(--muted)',fontWeight:600}}>{label}</span>
                    <span style={{fontSize:12,fontWeight:700,color:'var(--text)',textAlign:'right',maxWidth:'55%'}}>{val||'—'}</span>
                  </div>
                ))}
              </div>
              <div style={{padding:'6px 12px',background:'#DBEAFE',fontSize:11,color:'#1E40AF'}}>
                ✏️ <strong>What will be applied:</strong> Address · Property Tax · Rent per unit (all units) · Sq ft / Year Built stored as reference. You can override any values after applying.
              </div>
              <div style={{display:'flex',gap:8,padding:12}}>
                <button onClick={applyPreview} style={{flex:1,background:'#10B981',color:'#fff',border:'none',borderRadius:6,padding:'9px 0',fontWeight:700,fontSize:13,cursor:'pointer'}}>
                  ✅ Apply to Deal
                </button>
                <button onClick={()=>setPreview(null)} style={{flex:1,background:'var(--card)',color:'var(--muted)',border:'1px solid var(--border)',borderRadius:6,padding:'9px 0',fontWeight:700,fontSize:13,cursor:'pointer'}}>
                  ✕ Discard
                </button>
              </div>
            </div>
          )}

          {deal.assumptions.rentcastData && !pv && (
            <div style={{marginTop:10,fontSize:11,color:'var(--muted)',display:'flex',alignItems:'center',gap:6}}>
              <span>✅ Last fetched: {deal.assumptions.rentcastData.fetchedAt}</span>
              {deal.assumptions.rentcastData.squareFootage && <span>· {deal.assumptions.rentcastData.squareFootage.toLocaleString()} sq ft</span>}
              {deal.assumptions.rentcastData.yearBuilt && <span>· Built {deal.assumptions.rentcastData.yearBuilt}</span>}
              {deal.assumptions.rentcastData.propertyType && <span>· {deal.assumptions.rentcastData.propertyType}</span>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function AssumptionsTab({deal,onChange}){
  const a=deal.assumptions;
  const isMobile=useIsMobile();
  const upd=(path,val)=>{const d=JSON.parse(JSON.stringify(deal));const parts=path.split(".");let obj=d.assumptions;for(let i=0;i<parts.length-1;i++){if(obj[parts[i]]==null||typeof obj[parts[i]]!=="object")obj[parts[i]]={};obj=obj[parts[i]];}obj[parts[parts.length-1]]=val;onChange(d);};
  const grossRentYear0=a.units.slice(0,a.numUnits).reduce((s,u)=>s+(+u.rent||0)*12,0);
  const expFields=[["propertyTax","propertyTaxPct","Property Tax"],["insurance","insurancePct","Insurance"],["maintenance","maintenancePct","Maintenance"],["capex","capexPct","CapEx Reserve"],["propertyMgmt","propertyMgmtPct","Property Management"],["utilities","utilitiesPct","Utilities"]];
  return(<div style={{padding:"16px 0"}}>
    <PropertyLookupPanel deal={deal} onChange={onChange}/>
    <Section title="Purchase">
      <InputRow label="Purchase Price" value={a.purchasePrice} onChange={v=>upd("purchasePrice",v)} prefix="$" source={a.purchasePriceSource} onSourceChange={v=>upd("purchasePriceSource",v)}/>
      <InputRow label="Down Payment" value={a.downPaymentPct} onChange={v=>upd("downPaymentPct",v)} suffix="%" source={a.downPaymentSource} onSourceChange={v=>upd("downPaymentSource",v)}/>
      <InputRow label="Seller Concessions" value={a.sellerConcessions} onChange={v=>upd("sellerConcessions",v)} prefix="$" source={a.sellerConcessionsSource} onSourceChange={v=>upd("sellerConcessionsSource",v)}/>
    </Section>
        <Section title="Financing">
      <InputRow label="Interest Rate" value={a.interestRate} onChange={v=>upd("interestRate",v)} suffix="%" source={a.interestRateSource} onSourceChange={v=>upd("interestRateSource",v)}/>
      <InputRow label="Amortization" value={a.amortYears} onChange={v=>upd("amortYears",v)} suffix="yrs" source={a.amortSource} onSourceChange={v=>upd("amortSource",v)}/>
    </Section>
    <Section title="Property Details">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Number of Units</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>{if(a.numUnits>2)upd("numUnits",a.numUnits-1);}} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:6,width:28,height:28,cursor:"pointer",color:"var(--text)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
            <span style={{fontWeight:700,fontSize:15,minWidth:20,textAlign:"center"}}>{a.numUnits}</span>
            <button onClick={()=>{if(a.numUnits<4)upd("numUnits",a.numUnits+1);}} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:6,width:28,height:28,cursor:"pointer",color:"var(--text)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
          </div>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Year Built</div>
          <input type="number" value={a.yearBuilt||""} placeholder="e.g. 1985"
            onChange={e=>upd("yearBuilt",e.target.value)}
            style={{width:"100%",padding:"7px 10px",borderRadius:7,fontSize:14,border:"1px solid var(--border)",background:"var(--input-bg)",color:"var(--text)",fontFamily:"inherit"}}/>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Bedrooms (total)</div>
          <input type="number" value={a.beds||""} placeholder="e.g. 4"
            onChange={e=>upd("beds",e.target.value)}
            style={{width:"100%",padding:"7px 10px",borderRadius:7,fontSize:14,border:"1px solid var(--border)",background:"var(--input-bg)",color:"var(--text)",fontFamily:"inherit"}}/>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Bathrooms (total)</div>
          <input type="number" value={a.baths||""} placeholder="e.g. 2"
            onChange={e=>upd("baths",e.target.value)}
            style={{width:"100%",padding:"7px 10px",borderRadius:7,fontSize:14,border:"1px solid var(--border)",background:"var(--input-bg)",color:"var(--text)",fontFamily:"inherit"}}/>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Sq. Footage (total)</div>
          <input type="number" value={a.sqftTotal||""} placeholder="e.g. 2400"
            onChange={e=>upd("sqftTotal",e.target.value)}
            style={{width:"100%",padding:"7px 10px",borderRadius:7,fontSize:14,border:"1px solid var(--border)",background:"var(--input-bg)",color:"var(--text)",fontFamily:"inherit"}}/>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Lot Size (sq ft)</div>
          <input type="number" value={a.lotSize||""} placeholder="e.g. 5200"
            onChange={e=>upd("lotSize",e.target.value)}
            style={{width:"100%",padding:"7px 10px",borderRadius:7,fontSize:14,border:"1px solid var(--border)",background:"var(--input-bg)",color:"var(--text)",fontFamily:"inherit"}}/>
        </div>
        <div style={{marginBottom:10,gridColumn:"1 / -1"}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Annual Property Tax ($)</div>
          <input type="number" value={a.annualPropertyTax||""} placeholder="e.g. 6000"
            onChange={e=>upd("annualPropertyTax",e.target.value)}
            style={{maxWidth:200,width:"100%",padding:"7px 10px",borderRadius:7,fontSize:14,border:"1px solid var(--border)",background:"var(--input-bg)",color:"var(--text)",fontFamily:"inherit"}}/>
          {a.rentcastData?.annualTax && !a.annualPropertyTax &&
            <div style={{fontSize:11,color:"var(--muted)",marginTop:3}}>
              Rentcast: ${(+a.rentcastData.annualTax).toLocaleString()}/yr
              <button onClick={()=>upd("annualPropertyTax", a.rentcastData.annualTax)}
                style={{marginLeft:6,fontSize:11,color:"var(--accent)",background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit"}}>
                Use this
              </button>
            </div>
          }
        </div>
      </div>
      {a.rentcastData && (
        <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>
          ℹ️ Fields pre-filled from Rentcast data fetched {a.rentcastData.fetchedAt}
        </div>
      )}
    </Section>
    <Section title={`Units & Rent (${a.numUnits} units)`} action={<div style={{display:"flex",gap:8}}><button onClick={()=>{if(a.numUnits>2)upd("numUnits",a.numUnits-1);}} style={btnSm}>−</button><button onClick={()=>{if(a.numUnits<4)upd("numUnits",a.numUnits+1);}} style={btnSm}>+</button></div>}>
      {Array.from({length:a.numUnits}).map((_,i)=>{
        const u=a.units[i]||{};
        const effRent=+u.rent||+u.listedRent||0;
        return(<div key={i} style={{marginBottom:14,padding:12,background:"var(--row-sub)",borderRadius:8,border:"1px solid var(--border-faint)"}}>
          <div style={{fontWeight:800,fontSize:12,color:"var(--accent)",letterSpacing:"0.06em",marginBottom:8,textTransform:"uppercase"}}>Unit {i+1}</div>
          {/* Listed Rent */}
          <div style={{display:"grid",gridTemplateColumns:"160px 1fr",gap:6,alignItems:"center",marginBottom:6}}>
            <label style={{fontSize:12,color:"var(--muted)",fontWeight:600}}>Listed Rent</label>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{color:"var(--muted)",fontSize:13}}>$</span>
              <input type="number" value={u.listedRent||""} placeholder="0"
                onChange={e=>{const d=JSON.parse(JSON.stringify(deal));d.assumptions.units[i]={...d.assumptions.units[i],listedRent:+e.target.value};onChange(d);}}
                style={{...iSty,flex:1}}/>
              <span style={{fontSize:11,color:"var(--muted)"}}>/mo</span>
            </div>
          </div>
          {/* Rentcast Rent — read-only, only shown if populated */}
          {u.rentcastRent>0&&(<div style={{display:"grid",gridTemplateColumns:"160px 1fr",gap:6,alignItems:"center",marginBottom:6}}>
            <label style={{fontSize:12,color:"#6366F1",fontWeight:600}}>Rentcast Est.</label>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{fontSize:13,fontWeight:700,color:"#6366F1"}}>{FMT_USD(u.rentcastRent)}/mo</span>
              {u.rentcastRentRange&&<span style={{fontSize:11,color:"var(--muted)"}}>({u.rentcastRentRange})</span>}
            </div>
          </div>)}
          {/* Adjusted Rent */}
          <div style={{display:"grid",gridTemplateColumns:"160px 1fr",gap:6,alignItems:"center"}}>
            <label style={{fontSize:12,color:"var(--text)",fontWeight:700}}>Adjusted Rent <span style={{fontSize:10,color:"var(--muted)",fontWeight:400}}>(used in model)</span></label>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{color:"var(--muted)",fontSize:13}}>$</span>
              <input type="number" value={u.rent||""} placeholder={effRent||"0"}
                onChange={e=>{const d=JSON.parse(JSON.stringify(deal));d.assumptions.units[i]={...d.assumptions.units[i],rent:+e.target.value};onChange(d);}}
                style={{...iSty,flex:1,borderColor:"var(--accent)"}}/>
              <span style={{fontSize:11,color:"var(--muted)"}}>/mo</span>
            </div>
          </div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>
            {u.rent>0?"Using Adjusted Rent":u.listedRent>0?"No Adjusted Rent set — using Listed Rent":"No rent set"}
          </div>
        </div>);
      })}
      <div style={{fontSize:13,color:"var(--accent)",fontWeight:700,padding:"6px 0"}}>Blended Monthly Avg: {FMT_USD(a.units.slice(0,a.numUnits).reduce((s,u)=>s+(+(u.rent||u.listedRent)||0),0)/a.numUnits)} / unit</div>
      <InputRow label="Vacancy Rate" value={a.vacancyRate} onChange={v=>upd("vacancyRate",v)} suffix="%" source={a.vacancySource} onSourceChange={v=>upd("vacancySource",v)}/>
    </Section>
    <Section title="Expenses" action={<label style={{fontSize:12,color:"var(--muted)",display:"flex",gap:6,alignItems:"center",cursor:"pointer"}}><input type="checkbox" checked={a.selfManage} onChange={e=>upd("selfManage",e.target.checked)}/> Self-manage</label>}>
      {expFields.map(([vk,pk,lbl])=>{
        const modes=a.expenseModes||{}, isItemPct=modes[vk]==="pct";
        const toggleMode=()=>{const d=JSON.parse(JSON.stringify(deal));if(!d.assumptions.expenseModes)d.assumptions.expenseModes={};d.assumptions.expenseModes[vk]=isItemPct?"value":"pct";onChange(d);};
        const modeToggle=(<div style={{display:"flex",background:"var(--input-bg)",borderRadius:4,border:"1px solid var(--border)",overflow:"hidden",flexShrink:0}}>{[["value","$"],["pct","%"]].map(([k,l2])=>(<button key={k} onClick={toggleMode} style={{padding:"3px 9px",fontSize:12,fontWeight:700,border:"none",cursor:"pointer",background:(modes[vk]||"value")===k?"var(--accent)":"transparent",color:(modes[vk]||"value")===k?"#fff":"var(--muted)"}}>{l2}</button>))}</div>);
        const expKey=isItemPct?pk:vk;
        const expRawVal=isItemPct?a.expenses[pk]:a.expenses[vk];
        if(isMobile){
          return(<ExpenseInputRow key={vk} lbl={lbl} modeToggle={modeToggle} isItemPct={isItemPct} rawVal={expRawVal} onChange={v=>upd(`expenses.${expKey}`,v)} mobile/>);
        }
        return(<ExpenseInputRow key={vk} lbl={lbl} modeToggle={modeToggle} isItemPct={isItemPct} rawVal={expRawVal} onChange={v=>upd(`expenses.${expKey}`,v)} srcVal={a.expenses[`${vk}Source`]||""} onSrcChange={v=>upd(`expenses.${vk}Source`,v)}/>);
      })}
      <div style={{fontSize:12,color:"var(--muted)",padding:"6px 0"}}>Year 1 computed total: <strong style={{color:"var(--text)"}}>{FMT_USD(resolveExpenses(a,grossRentYear0).total)}</strong></div>
    </Section>
    {(()=>{
      const [ccOpen, setCcOpen] = React.useState(false);
      const ccTotal = Object.values(a.closingCosts||{}).reduce((s,v)=>s+(+v||0),0);
      return (
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            borderBottom:"2px solid var(--accent)",paddingBottom:6,marginBottom:ccOpen?10:0,cursor:"pointer"}}
            onClick={()=>setCcOpen(v=>!v)}>
            <div style={{fontSize:12,fontWeight:800,letterSpacing:"0.1em",color:"var(--accent)",textTransform:"uppercase"}}>
              Closing Costs <span style={{fontWeight:400,color:"var(--muted)",fontSize:11,textTransform:"none",letterSpacing:0}}>({FMT_USD(ccTotal)} total)</span>
            </div>
            <div style={{fontSize:14,color:"var(--muted)",transform:ccOpen?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</div>
          </div>
          {ccOpen && (
            <div>
              {[["title","Title"],["transferTax","Transfer Tax"],["inspection","Inspection"],["attorney","Attorney"],["lenderFees","Lender Fees"]].map(([k,lbl])=>(
                <InputRow key={k} label={lbl} value={a.closingCosts[k]} onChange={v=>upd(`closingCosts.${k}`,v)} prefix="$"/>
              ))}
            </div>
          )}
        </div>
      );
    })()}
    <Section title="Owner Occupancy" action={<label style={{fontSize:12,color:"var(--muted)",display:"flex",gap:8,alignItems:"center",cursor:"pointer"}}><input type="checkbox" checked={!!a.ownerOccupied} onChange={e=>upd("ownerOccupied",e.target.checked)}/> Enable</label>}>
      {a.ownerOccupied ? (<>
        <div style={{display:isMobile?"block":"grid",gridTemplateColumns:"200px 1fr 1fr",gap:8,alignItems:"center",padding:"5px 0",borderBottom:"1px solid var(--border-faint)"}}>
          <label style={{fontSize:13,color:"var(--muted)",fontWeight:500,display:"block",marginBottom:isMobile?4:0}}>Your Unit</label>
          <select value={a.ownerUnit||0} onChange={e=>upd("ownerUnit",+e.target.value)} style={{...iSty,gridColumn:"span 2"}}>
            {Array.from({length:a.numUnits}).map((_,i)=><option key={i} value={i}>Unit {i+1}{a.units[i]?.rent>0?` — ${FMT_USD(+a.units[i].rent)}/mo`:""}</option>)}
          </select>
        </div>
        <InputRow label="Occupancy Duration" value={a.ownerOccupancyYears||2} onChange={v=>upd("ownerOccupancyYears",v)} suffix="yrs"/>
        <InputRow label="Alternative Rent" value={a.alternativeRent||0} onChange={v=>upd("alternativeRent",v)} prefix="$" suffix="/mo"/>
        <InputRow label="Owner Use Utilities" value={a.ownerUseUtilities||0} onChange={v=>upd("ownerUseUtilities",v)} prefix="$" suffix="/yr"/>
        <div style={{fontSize:12,color:"var(--muted)",padding:"6px 0",borderTop:"1px solid var(--border-faint)",marginTop:4}}>
          Rent foregone Yr 1–{a.ownerOccupancyYears||2}: <strong style={{color:"#f59e0b"}}>{FMT_USD((+a.units[Math.min(+a.ownerUnit||0,a.numUnits-1)]?.rent||0)*12)}/yr</strong> · Unit {(+a.ownerUnit||0)+1} rented at market rate from Year {(+a.ownerOccupancyYears||2)+1}
        </div>
      </>) : <div style={{fontSize:13,color:"var(--muted)",padding:"8px 0"}}>Enable to model living in one unit and not collecting rent during your occupancy period.</div>}
    </Section>
    <Section title="Growth & Exit">
      <InputRow label="Rent Growth" value={a.rentGrowth} onChange={v=>upd("rentGrowth",v)} suffix="%/yr"/>
      <InputRow label="Expense Growth" value={a.expenseGrowth} onChange={v=>upd("expenseGrowth",v)} suffix="%/yr"/>
      <InputRow label="Appreciation Rate" value={a.appreciationRate} onChange={v=>upd("appreciationRate",v)} suffix="%/yr"/>
      <InputRow label="Tax Bracket (MFJ)" value={a.taxBracket} onChange={v=>upd("taxBracket",v)} suffix="%"/>
    </Section>
    <Section title="Refinance Scenario" action={<label style={{fontSize:12,color:"var(--muted)",display:"flex",gap:8,alignItems:"center",cursor:"pointer"}}><input type="checkbox" checked={a.refi.enabled} onChange={e=>upd("refi.enabled",e.target.checked)}/> Enable</label>}>
      {a.refi.enabled?<><InputRow label="Refi Year" value={a.refi.year} onChange={v=>upd("refi.year",v)}/><InputRow label="New Rate" value={a.refi.newRate} onChange={v=>upd("refi.newRate",v)} suffix="%"/><InputRow label="New LTV" value={a.refi.newLTV} onChange={v=>upd("refi.newLTV",v)} suffix="%"/></>:<div style={{fontSize:13,color:"var(--muted)",padding:"8px 0"}}>Enable to model a cash-out refinance during the hold period.</div>}
    </Section>
    <Section title="Value Add" action={<label style={{fontSize:12,color:"var(--muted)",display:"flex",gap:8,alignItems:"center",cursor:"pointer"}}><input type="checkbox" checked={!!(a.valueAdd?.enabled)} onChange={e=>upd("valueAdd.enabled",e.target.checked)}/> Enable</label>}>
      {a.valueAdd?.enabled?<><InputRow label="Total Remodel Cost" value={a.valueAdd.reModelCost} onChange={v=>upd("valueAdd.reModelCost",v)} prefix="$" source="" onSourceChange={()=>{}}/><InputRow label="Rent Bump / Unit / Mo" value={a.valueAdd.rentBumpPerUnit} onChange={v=>upd("valueAdd.rentBumpPerUnit",v)} prefix="$"/><InputRow label="Units Renovated" value={a.valueAdd.unitsRenovated} onChange={v=>upd("valueAdd.unitsRenovated",Math.min(+v,a.numUnits))} suffix={`of ${a.numUnits}`}/><InputRow label="Completion Year" value={a.valueAdd.completionYear} onChange={v=>upd("valueAdd.completionYear",v)} suffix="yr"/><div style={{fontSize:12,color:"var(--muted)",padding:"6px 0",borderTop:"1px solid var(--border-faint)",marginTop:4}}>Annual rent lift: <strong style={{color:"var(--text)"}}>{FMT_USD((+a.valueAdd.rentBumpPerUnit||0)*Math.min(+a.valueAdd.unitsRenovated||0,a.numUnits)*12)}</strong> · Value implied via NOI/cap rate from Year {a.valueAdd.completionYear}</div></>:<div style={{fontSize:13,color:"var(--muted)",padding:"8px 0"}}>Enable to model remodeling costs and post-renovation rent uplift.</div>}
    </Section>
  </div>);
}

// ─── CASH FLOW TAB ────────────────────────────────────────────────────────────
function CashFlowTab({result,deal}){
  const [showExpDetail,setShowExpDetail]=useState(false);
  const EXP_KEYS=[["propertyTax","Property Tax"],["insurance","Insurance"],["maintenance","Maintenance"],["capex","CapEx Reserve"],["propertyMgmt","Prop. Mgmt"],["utilities","Utilities"]];
  const tdR=(bold,color)=>({padding:"6px 8px",textAlign:"right",fontSize:11,fontWeight:bold?700:400,whiteSpace:"nowrap",color:color==="accent"?"var(--accent)":color==="red"?"#ef4444":"var(--text)"});
  const tdL=(bold,indent,col)=>({padding:`6px 8px 6px ${indent?20:8}px`,color:col||(bold?"var(--text)":"var(--muted)"),fontWeight:bold?700:400,fontSize:indent?10:11,whiteSpace:"nowrap",position:"sticky",left:0,background:"var(--bg)",zIndex:1});
  const Yr=({children,bold,color})=>result.years.map(y=>(<td key={y.yr} style={tdR(bold,color)}>{children(y)}</td>));
  const R=({label,children,bold,color,indent,labelColor})=>(<tr><td style={tdL(bold,indent,labelColor)}>{label}</td>{children}</tr>);
  return(<div style={{padding:"16px 0"}}>
    <div style={{fontSize:11,color:"var(--muted)",marginBottom:8}}>← Swipe to see all years</div>
    <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
      <table style={{borderCollapse:"collapse",fontSize:11}}>
        <thead>
          <tr style={{background:"var(--table-head)"}}>
            {["","Yr1","Yr2","Yr3","Yr4","Yr5","Yr6","Yr7","Yr8","Yr9","Yr10"].map(h=>(<th key={h} style={{padding:"6px 8px",textAlign:h===""?"left":"right",color:"var(--muted)",fontWeight:700,fontSize:10,letterSpacing:"0.05em",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap",position:h===""?"sticky":"static",left:0,background:"var(--table-head)",zIndex:h===""?2:0,minWidth:h===""?100:62}}>{h}</th>))}
          </tr>
        </thead>
        <tbody>
          <CFSectionHeader label="① Investment Cash Flow"/>
          <R label="Gross Rent"><Yr>{y=>FMT_USD(y.grossRent)}</Yr></R>
          <R label="Vacancy Loss" color="red"><Yr color="red">{y=>FMT_USD(y.vacancyLoss)}</Yr></R>
          <R label="EGI" bold><Yr bold>{y=>FMT_USD(y.egi)}</Yr></R>
          {result.vaEnabled&&(<tr><td style={tdL(false,true,"#a78bfa")}>↳ VA Rent Lift (Yr {result.vaCompletionYr}+)</td>{result.years.map(y=>(<td key={y.yr} style={{...tdR(y.vaRentLift>0,null),color:y.vaRentLift>0?"#a78bfa":"var(--muted)"}}>{y.vaRentLift>0?`+${FMT_USD(y.vaRentLift)}`:"—"}</td>))}</tr>)}
          <tr style={{cursor:"pointer"}} onClick={()=>setShowExpDetail(v=>!v)}>
            <td style={{...tdL(false,false),userSelect:"none"}}><span style={{color:"var(--accent)",marginRight:4,fontSize:9,display:"inline-block",transform:showExpDetail?"rotate(90deg)":"rotate(0)"}}>&#9658;</span>Total Expenses</td>
            {result.years.map(y=><td key={y.yr} style={tdR(false,"red")}>{FMT_USD(y.expenses)}</td>)}
          </tr>
          {showExpDetail&&EXP_KEYS.map(([k,lbl])=>(<tr key={k} style={{background:"var(--row-sub)"}}><td style={{...tdL(false,true),background:"var(--row-sub)"}}>&#x21b3; {lbl}</td>{result.years.map(y=><td key={y.yr} style={tdR(false,null)}>{FMT_USD(y.expBreakdown[k])}</td>)}</tr>))}
          <R label="NOI" bold><Yr bold>{y=>FMT_USD(y.noi)}</Yr></R>
          <tr>
            <td style={tdL(false,false)}>Debt Service</td>
            {result.years.map(y=>(<td key={y.yr} style={tdR(false,"red")}>{y.refiEvent&&<div style={{fontSize:8,fontWeight:800,color:"#f59e0b"}}>↻ Refi</div>}{FMT_USD(y.debtService)}</td>))}
          </tr>
          {result.refiYear&&(<tr><td style={{...tdL(false,true),color:"#f59e0b"}}>↳ Cash-Out (Yr {result.refiYear})</td>{result.years.map(y=>(<td key={y.yr} style={{...tdR(!!y.refiEvent,null),color:y.refiEvent?"#f59e0b":"var(--muted)"}}>{y.refiEvent?FMT_USD(y.refiEvent.cashOut):"—"}</td>))}</tr>)}
          <R label="Cash Flow" bold color="accent"><Yr bold color="accent">{y=>FMT_USD(y.cashFlow)}</Yr></R>
          {result.vaEnabled&&(<tr><td style={{...tdL(false,true),color:"#a78bfa"}}>↳ Remodel (Yr1–2)</td>{result.years.map(y=>(<td key={y.yr} style={{...tdR(y.vaRemodelOutflow>0,null),color:y.vaRemodelOutflow>0?"#a78bfa":"var(--muted)"}}>{y.vaRemodelOutflow>0?`(${FMT_USD(y.vaRemodelOutflow)})`:"—"}</td>))}</tr>)}
          <R label="CoC Return" color="accent"><Yr color="accent">{y=>FMT_PCT(y.cocReturn)}</Yr></R>
          {result.ooEnabled&&(<>
            <CFSectionHeader label="② Owner Occupied Cash Flow"/>
            <R label="Cash Flow (Invest.)" bold color="accent"><Yr bold color="accent">{y=>FMT_USD(y.cashFlow)}</Yr></R>
            <tr><td style={{...tdL(false,true),color:"#f59e0b"}}>↳ − Unit {(result.ooUnit||0)+1} Rent (Yr 1–{result.ooYears})</td>{result.years.map(y=>(<td key={y.yr} style={{...tdR(y.ooRentLost>0,null),color:y.ooRentLost>0?"#f59e0b":"var(--muted)"}}>{y.ooRentLost>0?`(${FMT_USD(y.ooRentLost)})`:"—"}</td>))}</tr>
            <tr><td style={{...tdL(false,true),color:"#f59e0b"}}>↳ − Owner Utilities (Yr 1–{result.ooYears})</td>{result.years.map(y=>(<td key={y.yr} style={{...tdR(y.ooUtilities>0,null),color:y.ooUtilities>0?"#f59e0b":"var(--muted)"}}>{y.ooUtilities>0?`(${FMT_USD(y.ooUtilities)})`:"—"}</td>))}</tr>
            <R label="Owner Occ. Cash Flow" bold color="accent"><Yr bold color="accent">{y=>y.ooCashFlow!==null?FMT_USD(y.ooCashFlow):FMT_USD(y.cashFlow)}</Yr></R>
            <tr><td style={{...tdL(false,true),color:"var(--accent2)",fontStyle:"italic"}}>↳ Monthly Net</td>{result.years.map(y=>{const mc=y.ooCashFlow!==null?y.ooMonthlyCashFlow:y.monthlyCashFlow;return(<td key={y.yr} style={{...tdR(true,null),color:mc>=0?"var(--accent2)":"#ef4444",fontStyle:"italic"}}>{mc>=0?FMT_USD(mc):`(${FMT_USD(Math.abs(mc))})`}</td>);})}</tr>
            <tr><td style={{...tdL(false,false),color:"var(--muted)"}}>Alt. Rent (if renting)</td>{result.years.map(y=>(<td key={y.yr} style={{...tdR(false,null),color:"var(--muted)",fontStyle:"italic"}}>{y.ooRentLost>0?`(${FMT_USD(result.ooAltRentMonthly)}/mo)`:"—"}</td>))}</tr>
          </>)}
          <CFSectionHeader label={result.ooEnabled?"③ Tax Implications":"② Tax Implications"}/>
          <R label="Depreciation (27.5yr)"><Yr>{y=>FMT_USD(y.depreciation)}</Yr></R>
          <R label="Mortgage Interest" color="red"><Yr color="red">{y=>FMT_USD(y.interest)}</Yr></R>
          <R label="Taxable RE Income" bold><Yr bold>{y=>FMT_USD(y.taxableIncome)}</Yr></R>
          <R label="QBI Deduction (20%)" color="red"><Yr color="red">{y=>y.taxableIncome>0?FMT_USD(y.qbi):"—"}</Yr></R>
          <tr><td style={tdL(true,false)}>Federal Tax / (Benefit)</td>{result.years.map(y=>(<td key={y.yr} style={{...tdR(true,null),color:y.taxEffect<0?"#10b981":"#ef4444"}}>{y.taxEffect<0?`(${FMT_USD(Math.abs(y.taxEffect))})`:FMT_USD(y.taxEffect)}</td>))}</tr>
          <R label="After-Tax CF" bold color="accent"><Yr bold color="accent">{y=>FMT_USD(y.afterTaxCashFlow)}</Yr></R>
          <CFSectionHeader label={result.ooEnabled?"④ Equity Accumulation":"③ Equity Accumulation"}/>
          <R label="Property Value"><Yr>{y=>FMT_USD(y.propertyValue)}</Yr></R>
          <R label="Loan Balance" color="red"><Yr color="red">{y=>FMT_USD(y.balance)}</Yr></R>
          <R label="Principal Paydown"><Yr>{y=>FMT_USD(y.principalPaydown)}</Yr></R>
          <R label="Appreciation Gain"><Yr>{y=>FMT_USD(y.appreciationGain)}</Yr></R>
          <R label="Total Equity" bold color="accent"><Yr bold color="accent">{y=>FMT_USD(y.equity)}</Yr></R>
        </tbody>
      </table>
    </div>
  </div>);
}

// ─── RENT COMPS TAB ──────────────────────────────────────────────────────────
function RentCompsTab({deal,onChange}){
  const isMobile=useIsMobile();
  const numUnits=deal.assumptions.numUnits;
  const inPlaceRents=deal.assumptions.units.slice(0,numUnits).map(u=>+u.rent||0);
  const inPlaceAvg=inPlaceRents.reduce((s,v)=>s+v,0)/numUnits;
  const compAvgs=deal.comps.map(c=>{const rents=Array.from({length:numUnits},(_,i)=>+(c.units[i]?.rent)||0).filter(r=>r>0);return rents.length?rents.reduce((s,v)=>s+v,0)/rents.length:0;});
  const overallAvg=compAvgs.filter(v=>v>0).length?compAvgs.filter(v=>v>0).reduce((s,v)=>s+v,0)/compAvgs.filter(v=>v>0).length:0;
  const updComp=(ci,field,val)=>{const d=JSON.parse(JSON.stringify(deal));d.comps[ci][field]=val;onChange(d);};
  const updUnit=(ci,ui,field,val)=>{const d=JSON.parse(JSON.stringify(deal));if(!d.comps[ci].units[ui])d.comps[ci].units[ui]={rent:0};d.comps[ci].units[ui][field]=val;onChange(d);};
  if(isMobile){return(<div style={{padding:"16px 0"}}>
    <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
      <MetricCard label="In-Place Avg/Unit" value={FMT_USD(inPlaceAvg)} sub="per month"/>
      <MetricCard label="Comp Avg/Unit" value={overallAvg?FMT_USD(overallAvg):"—"} sub={`${compAvgs.filter(v=>v>0).length} comps`} highlight={overallAvg>0}/>
      {overallAvg>0&&<MetricCard label="Spread vs Market" value={FMT_USD(overallAvg-inPlaceAvg)} sub={overallAvg>inPlaceAvg?"↑ upside":"✓ at market"}/>}
    </div>
    {deal.comps.map((c,ci)=>(<div key={ci} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:14,marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:800,color:"var(--muted)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Comp {ci+1}</div>
      <div style={{marginBottom:8}}><div style={{fontSize:11,color:"var(--muted)",marginBottom:3}}>Address</div><AddressAutocomplete value={c.address||""} onChange={v=>updComp(ci,"address",v)} placeholder="123 Main St" inputStyle={iSty}/></div>
      <div style={{marginBottom:8}}><div style={{fontSize:11,color:"var(--muted)",marginBottom:3}}>Source</div><input value={c.source||""} onChange={e=>updComp(ci,"source",e.target.value)} placeholder="Zillow, MLS, broker" style={{...iSty,fontSize:12}}/></div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>{Array.from({length:numUnits}).map((_,ui)=>(<div key={ui} style={{flex:"1 1 100px"}}><div style={{fontSize:11,color:"var(--muted)",marginBottom:3}}>Unit {ui+1} Rent</div><div style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:12,color:"var(--muted)"}}>$</span><input type="number" value={c.units[ui]?.rent||0} onChange={e=>updUnit(ci,ui,"rent",e.target.value)} style={iSty}/></div></div>))}</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12}}><div><span style={{color:"var(--muted)"}}>Avg: </span><strong style={{color:"var(--accent)"}}>{compAvgs[ci]>0?FMT_USD(compAvgs[ci]):"—"}</strong></div><input value={c.distance||""} onChange={e=>updComp(ci,"distance",e.target.value)} placeholder="0.5 mi" style={{...iSty,width:120,fontSize:12}}/></div>
    </div>))}
  </div>);}
  const TH={padding:"8px 10px",fontWeight:700,fontSize:11,letterSpacing:"0.06em",color:"var(--muted)",textTransform:"uppercase",borderBottom:"1px solid var(--border)",background:"var(--table-head)",whiteSpace:"nowrap"};
  const LC={padding:"8px 10px",fontSize:12,color:"var(--muted)",fontWeight:600,background:"var(--table-head)",borderRight:"1px solid var(--border)",whiteSpace:"nowrap"};
  return(<div style={{padding:"16px 0"}}>
    <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
      <MetricCard label="In-Place Avg Rent/Unit" value={FMT_USD(inPlaceAvg)} sub="per month"/>
      <MetricCard label="Comp Avg Rent/Unit" value={overallAvg?FMT_USD(overallAvg):"—"} sub={`${compAvgs.filter(v=>v>0).length} active comps`} highlight={overallAvg>0}/>
      {overallAvg>0&&<MetricCard label="Spread vs. Market" value={FMT_USD(overallAvg-inPlaceAvg)} sub={overallAvg>inPlaceAvg?"↑ rent upside":"✓ at/above market"}/>}
    </div>
    <div style={{overflowX:"auto"}}><table style={{borderCollapse:"collapse",fontSize:12,minWidth:900}}>
      <thead><tr><th style={{...TH,textAlign:"left",minWidth:150}}>Field</th><th style={{...TH,textAlign:"left",minWidth:160}}>Subject Property</th>{deal.comps.map((_,i)=><th key={i} style={{...TH,textAlign:"left",minWidth:190}}>Comp {i+1}</th>)}</tr></thead>
      <tbody>
        <tr><td style={LC}>Address</td><td style={{padding:"6px 10px",fontSize:12,color:"var(--text)",fontWeight:600}}>{deal.address||<em style={{color:"var(--muted)"}}>Subject property</em>}</td>{deal.comps.map((c,ci)=><td key={ci} style={{padding:"4px 6px"}}><AddressAutocomplete value={c.address||""} onChange={v=>updComp(ci,"address",v)} placeholder="123 Main St" inputStyle={{...iSty,fontSize:12}}/></td>)}</tr>
        <tr style={{background:"var(--row-sub)"}}><td style={{...LC,fontSize:11,fontStyle:"italic"}}>↳ Source</td><td style={{padding:"3px 6px"}}/>{deal.comps.map((c,ci)=>(<td key={ci} style={{padding:"3px 6px"}}><input value={c.source||""} onChange={e=>updComp(ci,"source",e.target.value)} placeholder="Zillow, MLS, broker" style={{...srcSty,fontSize:11}}/></td>))}</tr>
        {Array.from({length:numUnits}).map((_,ui)=>(<tr key={`u${ui}`}><td style={LC}>Unit {ui+1} Rent/mo</td><td style={{padding:"6px 10px",color:"var(--accent)",fontWeight:800}}>{FMT_USD(inPlaceRents[ui])}</td>{deal.comps.map((c,ci)=>(<td key={ci} style={{padding:"4px 6px"}}><div style={{display:"flex",alignItems:"center",gap:3}}><span style={{color:"var(--muted)",fontSize:12}}>$</span><input type="number" value={c.units[ui]?.rent||0} onChange={e=>updUnit(ci,ui,"rent",e.target.value)} style={{...iSty,fontSize:12}}/></div></td>))}</tr>))}
        <tr style={{background:"var(--accent-soft)",borderTop:"2px solid var(--accent)"}}><td style={{...LC,color:"var(--accent)"}}>Avg Rent / Unit</td><td style={{padding:"7px 10px",color:"var(--accent)",fontWeight:800,fontSize:13}}>{FMT_USD(inPlaceAvg)}</td>{deal.comps.map((_,ci)=><td key={ci} style={{padding:"7px 10px",color:"var(--accent)",fontWeight:800,fontSize:13}}>{compAvgs[ci]>0?FMT_USD(compAvgs[ci]):"—"}</td>)}</tr>
        <tr><td style={LC}>Distance from Subject</td><td style={{padding:"6px 10px",color:"var(--muted)",fontSize:12}}>—</td>{deal.comps.map((c,ci)=><td key={ci} style={{padding:"4px 6px"}}><input value={c.distance||""} onChange={e=>updComp(ci,"distance",e.target.value)} placeholder="0.5 mi" style={{...iSty,fontSize:12}}/></td>)}</tr>
      </tbody>
    </table></div>
  </div>);
}

// ─── SHOWING TAB ──────────────────────────────────────────────────────────────
function calcRehabTotal(showing,numUnits,phase){let t=0;for(let i=0;i<numUnits;i++){const u=(showing.units||[])[i]||{};if(u.rehabMode==="items")t+=(u.lineItems||[]).filter(li=>li.phase===phase).reduce((s,li)=>s+(+li.cost||0),0);else if((u.rehabPhase||"1")===phase)t+=+u.rehabLump||0;}const ext=showing.exterior||{};if(ext.rehabMode==="items")t+=(ext.lineItems||[]).filter(li=>li.phase===phase).reduce((s,li)=>s+(+li.cost||0),0);else if((ext.rehabPhase||"1")===phase)t+=+ext.rehabLump||0;return t;}
function ShowingTab({deal,onChange}){
  const numUnits=deal.assumptions.numUnits;
  const showing=deal.showing||{};
  const IMPR=[{val:"",label:"— Select —",color:"var(--muted)"},{val:"strong_pass",label:"Strong Pass",color:"#ef4444"},{val:"pass",label:"Pass",color:"#f97316"},{val:"neutral",label:"Neutral",color:"#8b949e"},{val:"like",label:"Like",color:"#3b82f6"},{val:"strong_like",label:"Strong Like",color:"#10b981"}];
  const COND_OPTS=["","Turnkey","Minor Updates","Moderate Rehab","Full Gut"];
  const COND_CLR={Turnkey:"#10b981","Minor Updates":"#3b82f6","Moderate Rehab":"#f59e0b","Full Gut":"#ef4444"};
  const PH=["1","2","3"];
  const PH_LABEL={"1":"Repairs at Closing","2":"Repair w/in 2 Yrs","3":"Defer"};
  const DEF_UNIT=[{cat:"Flooring",cost:0,phase:"1"},{cat:"Kitchen",cost:0,phase:"1"},{cat:"Bathrooms",cost:0,phase:"1"},{cat:"Paint",cost:0,phase:"1"},{cat:"Appliances",cost:0,phase:"1"},{cat:"Electrical",cost:0,phase:"1"},{cat:"Plumbing",cost:0,phase:"1"},{cat:"HVAC",cost:0,phase:"1"},{cat:"Roof",cost:0,phase:"1"},{cat:"Windows",cost:0,phase:"1"},{cat:"Other",cost:0,phase:"1",customLabel:""}];
  const DEF_EXT=[{cat:"Roof",cost:0,phase:"1"},{cat:"Siding",cost:0,phase:"1"},{cat:"Foundation",cost:0,phase:"1"},{cat:"Landscaping",cost:0,phase:"1"},{cat:"Driveway/Parking",cost:0,phase:"1"},{cat:"Windows/Doors",cost:0,phase:"1"},{cat:"Other",cost:0,phase:"1",customLabel:""}];
  const upd=(fn)=>{
    const d=JSON.parse(JSON.stringify(deal));
    if(!d.showing)d.showing={};
    if(!d.showing.units||!Array.isArray(d.showing.units))d.showing.units=Array(4).fill(null).map(()=>({condition:"",notes:"",rehabMode:"lump",rehabLump:0,rehabPhase:"1",lineItems:[]}));
    if(!d.showing.exterior)d.showing.exterior={condition:"",notes:"",rehabMode:"lump",rehabLump:0,rehabPhase:"1",lineItems:[]};
    fn(d);
    const p1=calcRehabTotal(d.showing,d.assumptions.numUnits,"1");
    if(!d.assumptions.valueAdd)d.assumptions.valueAdd={};
    d.assumptions.valueAdd.reModelCost=p1;
    onChange(d);
  };
  const imp=(deal.showing||{}).impression||"";
  const impObj=IMPR.find(o=>o.val===imp)||IMPR[0];
  const pt=PH.reduce((a,p)=>{a[p]=calcRehabTotal(deal.showing||{},numUnits,p);return a;},{});
  const gt=PH.reduce((s,p)=>s+(pt[p]||0),0);
  const iSty={background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:6,padding:"7px 10px",fontSize:13,color:"var(--text)",width:"100%",fontFamily:"inherit"};
  const cSty={background:"var(--card)",borderRadius:10,border:"1px solid var(--border)",padding:16,marginBottom:16};
  const lSty={fontSize:12,color:"var(--muted)",fontWeight:600,marginBottom:6,display:"block"};

  const renderRehab=(isUnit,idx)=>{
    const sh=deal.showing||{};
    const units=Array.isArray(sh.units)?sh.units:[];
    const s=isUnit?(units[idx]||{}):(sh.exterior||{});
    const isIt=s.rehabMode==="items";
    const items=s.lineItems||[];
    const setMode=(v)=>upd(d=>{
      const sec=isUnit?d.showing.units[idx]:d.showing.exterior;
      if(!sec)return;
      sec.rehabMode=v;
      if(v==="items"&&(!sec.lineItems||sec.lineItems.length===0))
        sec.lineItems=isUnit?DEF_UNIT.map(x=>({...x})):DEF_EXT.map(x=>({...x}));
    });
    const setField=(f,v)=>upd(d=>{const sec=isUnit?d.showing.units[idx]:d.showing.exterior;if(sec)sec[f]=v;});
    const setLI=(lIdx,f,v)=>upd(d=>{const it=isUnit?d.showing.units[idx].lineItems:d.showing.exterior.lineItems;if(it&&it[lIdx])it[lIdx][f]=v;});
    const setAll=(p)=>upd(d=>{const it=isUnit?d.showing.units[idx].lineItems:d.showing.exterior.lineItems;(it||[]).forEach(li=>li.phase=p);});
    return(<div style={{borderTop:"1px solid var(--border)",paddingTop:12,marginTop:4}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <span style={{fontSize:12,fontWeight:700,color:"var(--muted)"}}>Rehab Estimate</span>
        <label style={{fontSize:11,color:"var(--muted)",display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
          <input type="checkbox" checked={isIt} onChange={e=>setMode(e.target.checked?"items":"lump")}/> Line items
        </label>
      </div>
      {!isIt?(<div style={{display:"grid",gridTemplateColumns:"1fr 100px",gap:8}}>
        <input type="number" value={s.rehabLump||""} onChange={e=>setField("rehabLump",+e.target.value)} placeholder="0" style={iSty}/>
        <select value={s.rehabPhase||"1"} onChange={e=>setField("rehabPhase",e.target.value)} style={{...iSty,width:"auto"}}>{PH.map(p=><option key={p} value={p}>{PH_LABEL[p]}</option>)}</select>
      </div>):(<div>
        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:11,color:"var(--muted)"}}>Set all:</span>
          {PH.map(p=><button key={p} onClick={()=>setAll(p)} style={{fontSize:10,padding:"2px 8px",borderRadius:4,border:"1px solid var(--border)",background:"var(--card)",color:"var(--muted)",cursor:"pointer"}}>{PH_LABEL[p]}</button>)}
        </div>
        {items.map((li,lIdx)=>(
          <div key={lIdx} style={{display:"grid",gridTemplateColumns:li.cat==="Other"?"1fr 80px 70px":"auto 80px 70px",gap:5,marginBottom:5,alignItems:"center"}}>
            {li.cat==="Other"?<input value={li.customLabel||""} onChange={e=>setLI(lIdx,"customLabel",e.target.value)} placeholder="Custom category…" style={{...iSty,fontSize:11}}/>:<span style={{fontSize:12,color:"var(--text)"}}>{li.cat}</span>}
            <input type="number" value={li.cost||""} onChange={e=>setLI(lIdx,"cost",+e.target.value)} placeholder="0" style={{...iSty,fontSize:11}}/>
            <select value={li.phase||"1"} onChange={e=>setLI(lIdx,"phase",e.target.value)} style={{...iSty,fontSize:11,padding:"7px 3px"}}>{PH.map(p=><option key={p} value={p}>{PH_LABEL[p]}</option>)}</select>
          </div>
        ))}
      </div>)}
    </div>);
  };

  return(<div style={{padding:"16px 0"}}>
    <div style={cSty}>
      <label style={lSty}>Overall Impression</label>
      <select value={imp} onChange={e=>upd(d=>{d.showing.impression=e.target.value;})} style={{...iSty,color:impObj.color,fontWeight:700,fontSize:14}}>
        {IMPR.map(o=><option key={o.val} value={o.val}>{o.label}</option>)}
      </select>
    </div>
    {Array.from({length:numUnits}).map((_,i)=>{
      const _units=Array.isArray((deal.showing||{}).units)?(deal.showing.units):[];
      const u=_units[i]||{};const cond=u.condition||"";
      return(<div key={i} style={cSty}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <span style={{fontWeight:800,fontSize:14,color:"var(--text)"}}>Unit {i+1}</span>
          {cond&&<span style={{fontSize:11,fontWeight:700,padding:"2px 10px",borderRadius:12,background:(COND_CLR[cond]||"#8b949e")+"22",color:COND_CLR[cond]||"#8b949e"}}>{cond}</span>}
        </div>
        <label style={lSty}>Condition</label>
        <select value={cond} onChange={e=>upd(d=>{if(!d.showing.units[i])d.showing.units[i]={};d.showing.units[i].condition=e.target.value;})} style={{...iSty,color:COND_CLR[cond]||"var(--text)",fontWeight:cond?700:400,marginBottom:10}}>
          {COND_OPTS.map(o=><option key={o} value={o}>{o||"— Select —"}</option>)}
        </select>
        <label style={lSty}>Notes</label>
        <textarea value={u.notes||""} onChange={e=>upd(d=>{if(!d.showing.units[i])d.showing.units[i]={};d.showing.units[i].notes=e.target.value;})} rows={3} placeholder="Unit condition, features, tenant situation…" style={{...iSty,resize:"vertical",marginBottom:12}}/>
        {renderRehab(true,i)}
      </div>);
    })}
    {(()=>{const ext=((deal.showing||{}).exterior)||{};const cond=ext.condition||"";return(<div style={cSty}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <span style={{fontWeight:800,fontSize:14,color:"var(--text)"}}>Exterior</span>
        {cond&&<span style={{fontSize:11,fontWeight:700,padding:"2px 10px",borderRadius:12,background:(COND_CLR[cond]||"#8b949e")+"22",color:COND_CLR[cond]||"#8b949e"}}>{cond}</span>}
      </div>
      <label style={lSty}>Condition</label>
      <select value={cond} onChange={e=>upd(d=>{if(!d.showing.exterior)d.showing.exterior={};d.showing.exterior.condition=e.target.value;})} style={{...iSty,color:COND_CLR[cond]||"var(--text)",fontWeight:cond?700:400,marginBottom:10}}>
        {COND_OPTS.map(o=><option key={o} value={o}>{o||"— Select —"}</option>)}
      </select>
      <label style={lSty}>Notes</label>
      <textarea value={ext.notes||""} onChange={e=>upd(d=>{if(!d.showing.exterior)d.showing.exterior={};d.showing.exterior.notes=e.target.value;})} rows={3} placeholder="Roof, foundation, siding, landscaping, parking…" style={{...iSty,resize:"vertical",marginBottom:12}}/>
      {renderRehab(false,-1)}
    </div>);})()}
    <div style={{...cSty,background:"var(--accent-soft)",border:"1px solid var(--accent)44"}}>
      <span style={{fontWeight:800,fontSize:13,color:"var(--text)",display:"block",marginBottom:12}}>Rehab Rollup</span>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:12}}>
        {PH.map(p=>(<div key={p} style={{textAlign:"center",background:"var(--card)",borderRadius:8,padding:"10px 6px",border:"1px solid var(--border)"}}>
          <div style={{fontSize:10,color:"var(--muted)",fontWeight:700,marginBottom:4,letterSpacing:"0.04em"}}>{PH_LABEL[p]}{p==="1"?" · VA Remodel":""}</div>
          <div style={{fontSize:16,fontWeight:800,color:p==="1"?"var(--accent)":"var(--text)"}}>{"$"+Math.round(pt[p]||0).toLocaleString()}</div>
        </div>))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid var(--border)",paddingTop:10}}>
        <span style={{fontSize:13,fontWeight:700,color:"var(--muted)"}}>Total All Phases</span>
        <span style={{fontSize:18,fontWeight:800,color:"var(--text)"}}>{"$"+Math.round(gt).toLocaleString()}</span>
      </div>
      <div style={{fontSize:11,color:"var(--muted)",marginTop:8}}>⚡ "Repairs at Closing" auto-syncs → Value-Add Remodel Cost in Assumptions</div>
    </div>
  </div>);
}


function RedFlagsTab({deal,result,onChange,prefs=DEFAULT_PREFS}){
  const [exp,setExp]=useState({});
  const yr1=result.years?.[0];
