<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confirm Your Email — RentHack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
      --text: #e8eaed; --muted: #8b8fa3;
      --accent: #0d9488; --accent2: #0f766e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 20px;
    }
    .card {
      width: 100%; max-width: 440px; background: var(--card);
      border: 1.5px solid var(--border); border-radius: 22px;
      padding: 48px 40px; box-shadow: 0 24px 64px rgba(0,0,0,0.3);
      text-align: center;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      justify-content: center; margin-bottom: 36px;
    }
    .logo-icon {
      width: 44px; height: 44px; background: var(--accent);
      border-radius: 12px; display: flex; align-items: center;
      justify-content: center; font-size: 22px;
    }
    .logo-text {
      font-family: 'Fraunces', serif; font-weight: 900;
      font-size: 22px; letter-spacing: -0.5px;
    }
    .logo-text .accent { color: var(--accent); }
    .logo-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-weight: 800; font-size: 22px; margin-bottom: 10px; }
    .desc {
      color: var(--muted); font-size: 14px;
      line-height: 1.6; margin-bottom: 28px;
    }
    .btn {
      display: block; width: 100%; padding: 16px;
      border-radius: 100px; font-size: 16px; font-weight: 700;
      background: var(--accent); color: #fff; border: none;
      cursor: pointer; font-family: inherit;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none; text-align: center;
    }
    .btn:hover { background: var(--accent2); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .status { margin-top: 20px; font-size: 13px; font-weight: 600; }
    .status.success { color: #10b981; }
    .status.error { color: #ef4444; }
    .status.loading { color: var(--muted); }
    .security-note {
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px; color: var(--muted); line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🏠</div>
      <div>
        <div class="logo-text"><span>Rent</span><span class="accent">Hack</span></div>
        <div class="logo-sub">2–4 unit multifamily</div>
      </div>
    </div>
    <div id="content">
      <div class="icon">📧</div>
      <h1>Confirm your email</h1>
      <p class="desc">
        Click the button below to verify your email address and activate your RentHack account.
      </p>
      <button class="btn" id="confirmBtn">Confirm My Email</button>
      <div id="status"></div>
      <div class="security-note">
        🔒 For your security, we require you to click this button to confirm.<br/>
        Automated systems cannot complete this step.
      </div>
    </div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var tokenHash = params.get('token_hash');
      var type = params.get('type') || 'email';

      if (!tokenHash) {
        document.getElementById('content').innerHTML =
          '<div class="icon">🔗</div>' +
          '<h1>Invalid or expired link</h1>' +
          '<p class="desc">This confirmation link appears to be invalid or has already been used.</p>' +
          '<a href="/#app" class="btn" style="text-decoration:none;">Go to RentHack →</a>';
        return;
      }

      document.getElementById('confirmBtn').addEventListener('click', function() {
        var btn = this;
        var status = document.getElementById('status');
        btn.disabled = true;
        btn.textContent = 'Confirming…';
        status.className = 'status loading';
        status.textContent = 'Verifying your email address…';

        // Use the Supabase JS client to verify the OTP with token_hash
        var supabase = window.supabase.createClient(
          'https://lxkwvayalxuoryuwxtsq.supabase.co',
          'placeholder'  // anon key loaded below
        );

        // We need to call the verify endpoint directly since we may not
        // have the correct anon key hardcoded. Use the raw REST endpoint.
        // The correct param name is "token" (not "token_hash") per Supabase docs.
        var verifyUrl = 'https://lxkwvayalxuoryuwxtsq.supabase.co/auth/v1/verify'
          + '?token=' + encodeURIComponent(tokenHash)
          + '&type=' + encodeURIComponent(type)
          + '&redirect_to=' + encodeURIComponent(window.location.origin);

        // Navigate to the verify endpoint — Supabase will verify the token
        // and redirect back to our app with the session
        setTimeout(function() {
          window.location.href = verifyUrl;
        }, 800);
      });
    })();
  </script>
</body>
</html>
