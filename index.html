// ─── SENSITIVITY TAB ──────────────────────────────────────────────────────────
function SensitivityTab({deal}){
  const [metric,setMetric]=useState("irr");
  const sens=useMemo(()=>calcSensitivity(deal),[deal]);
  const base=useMemo(()=>calcDeal(deal),[deal]);
  const baseVal=metric==="irr"?base.irr:base.cocReturn;
  const sorted=useMemo(()=>[...sens].sort((a,b)=>{const rA=Math.abs((metric==="irr"?a.irrLowDelta:a.cocLowDelta)-(metric==="irr"?a.irrHighDelta:a.cocHighDelta));const rB=Math.abs((metric==="irr"?b.irrLowDelta:b.cocLowDelta)-(metric==="irr"?b.irrHighDelta:b.cocHighDelta));return rB-rA;}),[sens,metric]);
  const maxDelta=Math.max(...sorted.flatMap(s=>[Math.abs(metric==="irr"?s.irrLowDelta:s.cocLowDelta),Math.abs(metric==="irr"?s.irrHighDelta:s.cocHighDelta)]),0.001);
  const BAR_PCT=36;
  return(<div style={{padding:"16px 0"}}>
    <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
      <span style={{fontSize:13,color:"var(--muted)",fontWeight:600}}>Metric:</span>
      {[["irr","IRR (10yr)"],["coc","CoC (Yr1)"]].map(([k,lbl])=>(<button key={k} onClick={()=>setMetric(k)} style={{padding:"7px 14px",borderRadius:6,border:"1px solid var(--border)",background:metric===k?"var(--accent)":"var(--card)",color:metric===k?"#fff":"var(--text)",cursor:"pointer",fontSize:13,fontWeight:700}}>{lbl}</button>))}
      <span style={{fontSize:13,color:"var(--muted)"}}>Base: <strong style={{color:"var(--text)"}}>{FMT_PCT(baseVal)}</strong></span>
    </div>
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"20px 16px"}}>
      <div style={{fontSize:11,fontWeight:800,letterSpacing:"0.1em",color:"var(--muted)",marginBottom:16,textTransform:"uppercase"}}>Tornado Chart — {metric==="irr"?"10-Year IRR":"Year 1 CoC"}</div>
      <div style={{display:"grid",gridTemplateColumns:"90px 1fr",gap:0,marginBottom:6}}><div/><div style={{display:"grid",gridTemplateColumns:"1fr 1px 1fr"}}><div style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#ef4444",paddingBottom:4,borderBottom:"1px solid var(--border-faint)"}}>↙ Downside</div><div/><div style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#10b981",paddingBottom:4,borderBottom:"1px solid var(--border-faint)"}}>Upside ↗</div></div></div>
      {sorted.map((s,i)=>{const lowD=metric==="irr"?s.irrLowDelta:s.cocLowDelta;const highD=metric==="irr"?s.irrHighDelta:s.cocHighDelta;const lowAbs=metric==="irr"?s.irrLowAbs:s.cocLowAbs;const highAbs=metric==="irr"?s.irrHighAbs:s.cocHighAbs;const lowW=(Math.abs(lowD)/maxDelta)*BAR_PCT;const highW=(Math.abs(highD)/maxDelta)*BAR_PCT;return(<div key={i} style={{display:"grid",gridTemplateColumns:"90px 1fr",gap:0,marginBottom:10,alignItems:"center"}}><div style={{paddingRight:8,textAlign:"right"}}><div style={{fontSize:11,fontWeight:700,color:"var(--text)"}}>{s.label}</div><div style={{fontSize:9,color:"var(--muted)"}}>{s.unit}</div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1px 1fr",alignItems:"center"}}><div style={{display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end"}}><span style={{fontSize:10,color:"var(--muted)",whiteSpace:"nowrap",minWidth:44,textAlign:"right",fontWeight:600}}>{FMT_PCT(lowAbs)}</span><div style={{width:`${BAR_PCT}%`,display:"flex",justifyContent:"flex-end"}}><div style={{width:`${lowW}%`,height:24,background:"#ef4444cc",borderRadius:"3px 0 0 3px",minWidth:lowW>0?3:0}}/></div></div><div style={{background:"var(--border)",height:24,width:1}}/><div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:`${BAR_PCT}%`,display:"flex",justifyContent:"flex-start"}}><div style={{width:`${highW}%`,height:24,background:"#10b981cc",borderRadius:"0 3px 3px 0",minWidth:highW>0?3:0}}/></div><span style={{fontSize:10,color:"var(--muted)",whiteSpace:"nowrap",minWidth:44,fontWeight:600}}>{FMT_PCT(highAbs)}</span></div></div></div>);})}
      <div style={{display:"flex",gap:16,marginTop:12,paddingTop:12,borderTop:"1px solid var(--border-faint)",fontSize:10,color:"var(--muted)",flexWrap:"wrap"}}><span><span style={{color:"#ef4444",fontWeight:700}}>■</span> Downside</span><span><span style={{color:"#10b981",fontWeight:700}}>■</span> Upside</span></div>
    </div>
  </div>);
}

// ─── ADDRESS AUTOCOMPLETE ─────────────────────────────────────────────────────
function AddressAutocomplete({value, onChange, placeholder, inputStyle}) {
  const inputRef = useRef(null);
  const acRef = useRef(null);

  useEffect(() => {
    function initAC() {
      if (!inputRef.current || acRef.current) return;
      if (!window.google?.maps?.places) return;
      acRef.current = new window.google.maps.places.Autocomplete(inputRef.current, {
        types: ['address'],
        componentRestrictions: { country: 'us' },
        fields: ['formatted_address'],
      });
      acRef.current.addListener('place_changed', () => {
        const place = acRef.current.getPlace();
        if (place?.formatted_address) onChange(place.formatted_address);
      });
    }
    if (window.google?.maps?.places) {
      initAC();
    } else {
      const iv = setInterval(() => { if (window.google?.maps?.places) { initAC(); clearInterval(iv); } }, 200);
      return () => clearInterval(iv);
    }
  }, []);

  return (
    <input
      ref={inputRef}
      value={value}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      style={inputStyle}
    />
  );
}

const GMAPS_KEY = "AIzaSyAg90J2ZmwbAwPwlRHTeREfAWfiOwR1hiQ";
const RENTCAST_KEY = "ba391816691449ada9dea5b9151ff4d5";

function PortfolioMap({deals, onSelect}) {
  const mapRef = useRef(null);
  const mapObjRef = useRef(null);
  const markersRef = useRef([]);
  const infoRef = useRef(null);
  const [mapReady, setMapReady] = useState(!!window.google?.maps);
  const [collapsed, setCollapsed] = useState(false);
  const addressedDeals = deals.filter(d => d.address && d.address.trim().length > 3);

  // Load Maps JS API once
  useEffect(() => {
    if (window.google?.maps) { setMapReady(true); return; }
    if (document.getElementById('gmaps-script')) return;
    const s = document.createElement('script');
    s.id = 'gmaps-script';
    s.src = `https://maps.googleapis.com/maps/api/js?key=${GMAPS_KEY}&libraries=places&callback=__gmapsReady`;
    s.async = true;
    window.__gmapsReady = () => { setMapReady(true); delete window.__gmapsReady; };
    document.head.appendChild(s);
  }, []);

  // Init map once API ready and container visible
  useEffect(() => {
    if (!mapReady || !mapRef.current || collapsed) return;
    if (!mapObjRef.current) {
      mapObjRef.current = new window.google.maps.Map(mapRef.current, {
        zoom: 10,
        center: { lat: 41.8781, lng: -87.6298 }, // default: Chicago
        mapTypeId: 'roadmap',
        styles: [{featureType:"poi",stylers:[{visibility:"off"}]},{featureType:"transit",stylers:[{visibility:"off"}]}],
        disableDefaultUI: false,
        zoomControl: true,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true,
      });
      infoRef.current = new window.google.maps.InfoWindow();
    }
    syncMarkers();
  }, [mapReady, collapsed]);

  // Re-sync markers whenever deals change
  useEffect(() => {
    if (!mapObjRef.current) return;
    syncMarkers();
  }, [deals]);

  function syncMarkers() {
    // Clear old markers
    markersRef.current.forEach(m => m.setMap(null));
    markersRef.current = [];
    if (!addressedDeals.length) return;

    const geocoder = new window.google.maps.Geocoder();
    const bounds = new window.google.maps.LatLngBounds();
    let resolved = 0;

    addressedDeals.forEach(deal => {
      geocoder.geocode({ address: deal.address }, (results, status) => {
        if (status !== 'OK' || !results[0]) { resolved++; return; }
        const pos = results[0].geometry.location;
        bounds.extend(pos);
        const r = calcDeal(deal);
        const color = STATUS_COLORS[deal.status] || '#8b949e';

        // Custom pin SVG colored by status
        const pinSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
          <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24s16-14 16-24C32 7.163 24.837 0 16 0z" fill="${color}" stroke="white" stroke-width="2"/>
          <circle cx="16" cy="16" r="6" fill="white"/>
        </svg>`;
        const icon = {
          url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(pinSvg),
          scaledSize: new window.google.maps.Size(32, 40),
          anchor: new window.google.maps.Point(16, 40),
        };

        const marker = new window.google.maps.Marker({ position: pos, map: mapObjRef.current, icon, title: deal.address });

        marker.addListener('click', () => {
          const content = `
            <div style="font-family:'DM Sans','Segoe UI',sans-serif;min-width:200px;padding:4px 2px">
              <div style="font-weight:800;font-size:14px;color:#1f2328;margin-bottom:6px;line-height:1.3">${deal.address}</div>
              <span style="background:${color}22;color:${color};border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700">${deal.status}</span>
              <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:6px">
                <div><div style="font-size:10px;color:#656d76;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Price</div><div style="font-size:13px;font-weight:700;color:#1f2328">${FMT_USD(+deal.assumptions.purchasePrice)}</div></div>
                <div><div style="font-size:10px;color:#656d76;font-weight:700;text-transform:uppercase;letter-spacing:.05em">IRR</div><div style="font-size:13px;font-weight:700;color:#0969da">${FMT_PCT(r.irr)}</div></div>
                <div><div style="font-size:10px;color:#656d76;font-weight:700;text-transform:uppercase;letter-spacing:.05em">CoC Yr1</div><div style="font-size:13px;font-weight:700;color:#0969da">${FMT_PCT(r.cocReturn)}</div></div>
                <div><div style="font-size:10px;color:#656d76;font-weight:700;text-transform:uppercase;letter-spacing:.05em">NOI Yr1</div><div style="font-size:13px;font-weight:700;color:#1f2328">${FMT_USD(r.noi)}</div></div>
              </div>
              <button onclick="window.__openDeal_${deal.id}()" style="margin-top:10px;width:100%;background:#0969da;color:#fff;border:none;border-radius:6px;padding:7px 0;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit">Open Deal →</button>
            </div>`;
          window[`__openDeal_${deal.id}`] = () => { onSelect(deal.id); infoRef.current.close(); };
          infoRef.current.setContent(content);
          infoRef.current.open(mapObjRef.current, marker);
        });

        markersRef.current.push(marker);
        resolved++;
        if (resolved === addressedDeals.length && markersRef.current.length > 0) {
          if (markersRef.current.length === 1) {
            mapObjRef.current.setCenter(pos);
            mapObjRef.current.setZoom(14);
          } else {
            mapObjRef.current.fitBounds(bounds, 60);
          }
        }
      });
    });
  }

  if (!addressedDeals.length) return null;

  return (
    <div style={{marginBottom:20,border:"1px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
      <div
        onClick={()=>setCollapsed(v=>!v)}
        style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"var(--card)",cursor:"pointer",userSelect:"none"}}
      >
        <span style={{fontSize:12,fontWeight:800,letterSpacing:"0.08em",color:"var(--muted)",textTransform:"uppercase"}}>📍 Portfolio Map — {addressedDeals.length} propert{addressedDeals.length===1?"y":"ies"}</span>
        <span style={{fontSize:12,color:"var(--muted)",fontWeight:700}}>{collapsed?"Show ▾":"Hide ▴"}</span>
      </div>
      {!collapsed && (
        <div ref={mapRef} style={{width:"100%",height:380,display:"block"}}/>

        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"var(--card)",color:"var(--muted)",fontSize:13}}>Loading map…</div>
      )}
    </div>
  );
}

          {[["Price",FMT_USD(+d.assumptions.purchasePrice),false],["CoC (Yr1)",FMT_PCT(r.cocReturn),true],["IRR (10yr)",FMT_PCT(r.irr),true],["NOI (Yr1)",FMT_USD(r.noi),false],["Cap Rate",FMT_PCT(r.capRate),false],["Cash In",FMT_USD(r.totalCash),false]].map(([lbl,val,accent])=>(<div key={lbl}><div style={{fontSize:9,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:1}}>{lbl}</div><div style={{fontSize:13,fontWeight:700,color:accent?"var(--accent)":"var(--text)"}}>{val}</div></div>))}
        </div>
      </div>);}))
    }
    {toast&&<UndoToast message={toast.message} onUndo={()=>{onReorder(toast.snapshot);setToast(null);}} onDismiss={()=>setToast(null)}/>}
  </div>);}

  // Desktop table layout
  return(<div style={{maxWidth:1100,margin:"0 auto",paddingBottom:40}}>
    {activeGroup&&<div style={{background:"#ede9fe",border:"1px solid #c4b5fd",borderRadius:10,padding:"12px 18px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>

    {filterBar}

        <tbody>{filtered.map((d,i)=>{const r=calcDeal(d);const isDragging=dragIdx===i;const isOver=dragOverIdx===i&&dragIdx!==i;return(<tr key={d.id} draggable onDragStart={e=>handleDragStart(e,i)} onDragOver={e=>handleDragOver(e,i)} onDrop={e=>handleDrop(e,i)} onDragEnd={handleDragEnd} onClick={()=>onSelect(d.id)} style={{cursor:"pointer",borderBottom:"1px solid var(--border-faint)",opacity:isDragging?0.4:1,background:isOver?"var(--accent-soft)":"transparent",transition:"background 0.1s"}} onMouseEnter={e=>{if(!isDragging)e.currentTarget.style.background="var(--row-hover)";}} onMouseLeave={e=>{e.currentTarget.style.background=isOver?"var(--accent-soft)":"transparent";}}>

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState("login"); // login | signup | forgot | verify | reset
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [msg, setMsg] = useState("");

  useEffect(() => {
    const hash = window.location.hash;
    const params = new URLSearchParams(window.location.search);
    // Supabase v2 PKCE flow uses ?code= query param (not hash)
    // Legacy implicit flow uses #access_token=...&type=...
    const isRecovery = hash.includes("type=recovery") || params.get("type") === "recovery";
    const isSignup   = hash.includes("type=signup")   || params.get("type") === "signup";
    const hasCode    = params.has("code");

    if (isRecovery) {
      setMode("reset");
    } else if (isSignup || hasCode) {
      // Show verifying spinner — onAuthStateChange in App will fire SIGNED_IN
      // when Supabase exchanges the code/token, which bypasses this screen entirely.
      // 4s fallback in case exchange fails.
      setMode("verifying");
      const fallback = setTimeout(() => {
        window.history.replaceState(null, "", window.location.pathname);
        setMode("verified");
      }, 4000);
      return () => clearTimeout(fallback);
    }
  }, []);

  const clr = () => { setError(""); setMsg(""); };

  const doLogin = async () => {
    if (!email || !password) { setError("Please enter your email and password."); return; }
    setLoading(true); clr();
    const { data, error: e } = await authSignIn(email, password);
    setLoading(false);
    if (e) { setError(e.message); return; }
    if (data.user && !data.user.email_confirmed_at) {
      setError("Please verify your email first — check your inbox."); return;
    }
    onAuth(data.user);
  };

  const doSignup = async () => {
    if (!email || !password) { setError("Please fill in all fields."); return; }
    if (password.length < 8) { setError("Password must be at least 8 characters."); return; }
    if (password !== confirmPw) { setError("Passwords do not match."); return; }
    setLoading(true); clr();
    const { error: e } = await authSignUp(email, password);
    setLoading(false);
    if (e) { setError(e.message); return; }
    setMode("verify");
  };

  const doForgot = async () => {
    if (!email) { setError("Enter your email address."); return; }
    setLoading(true); clr();
    const { error: e } = await authResetPassword(email);
    setLoading(false);
    if (e) { setError(e.message); return; }
    setMsg("Reset link sent — check your email.");
  };

  const doReset = async () => {
    if (password.length < 8) { setError("Password must be at least 8 characters."); return; }
    if (password !== confirmPw) { setError("Passwords do not match."); return; }
    setLoading(true); clr();
    const { error: e } = await authUpdatePassword(password);
    setLoading(false);
    if (e) { setError(e.message); return; }
    setMsg("Password updated!");
    window.location.hash = "";
    setTimeout(() => setMode("login"), 1400);
  };

  const iS = { width:"100%", padding:"11px 14px", borderRadius:8, fontSize:15,
    border:"1px solid var(--border)", background:"var(--input-bg)", color:"var(--text)", fontFamily:"inherit" };
  const bS = { width:"100%", padding:"12px", borderRadius:8, fontSize:15, fontWeight:700,
    background:"var(--accent)", color:"#fff", border:"none", cursor:"pointer" };
  const lS = { color:"var(--accent)", cursor:"pointer", fontSize:13, fontWeight:600,
    background:"none", border:"none", padding:0, fontFamily:"inherit" };

  return (
    <div style={{minHeight:"100vh", background:"var(--bg)", display:"flex", alignItems:"center",
      justifyContent:"center", padding:16}}>
      <div style={{width:"100%", maxWidth:420, background:"var(--card)", border:"1px solid var(--border)",
        borderRadius:16, padding:"40px 36px"}}>

        <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:32, justifyContent:"center"}}>
          <div style={{width:38, height:38, background:"var(--accent)", borderRadius:9, display:"flex",
            alignItems:"center", justifyContent:"center", fontSize:20}}>🏢</div>
          <div>
            <div style={{fontWeight:800, fontSize:15}}>Multi-family Deal Analyzer</div>
            <div style={{fontSize:11, color:"var(--muted)"}}>2–4 Unit Multifamily</div>
          </div>
        </div>

        {mode === "verify" && (
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:44, marginBottom:12}}>📧</div>
            <div style={{fontWeight:800, fontSize:18, marginBottom:8}}>Check your inbox</div>
            <div style={{color:"var(--muted)", fontSize:14, lineHeight:1.6, marginBottom:20}}>
              We sent a verification link to <strong style={{color:"var(--text)"}}>{email}</strong>.<br/>
              Click it to activate your account.
            </div>
            <button style={lS} onClick={() => setMode("login")}>Back to login</button>
          </div>
        )}

        {mode === "verifying" && (
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:44, marginBottom:12}}>⏳</div>
            <div style={{fontWeight:800, fontSize:18, marginBottom:8}}>Verifying your email…</div>
            <div style={{color:"var(--muted)", fontSize:14, marginBottom:20}}>Just a moment while we activate your account.</div>
          </div>
        )}

        {mode === "verified" && (
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:44, marginBottom:12}}>✅</div>
            <div style={{fontWeight:800, fontSize:18, marginBottom:8}}>Email verified!</div>
            <div style={{color:"var(--muted)", fontSize:14, marginBottom:20}}>Your account is active. Sign in to continue.</div>
            <button style={bS} onClick={() => setMode("login")}>Go to Login</button>
          </div>
        )}

        {mode === "reset" && (
          <div style={{display:"flex", flexDirection:"column", gap:14}}>
            <div style={{fontWeight:800, fontSize:20, marginBottom:2}}>Set new password</div>
            <input type="password" placeholder="New password (min 8 chars)" value={password}
              onChange={e=>{setPassword(e.target.value);clr();}} style={iS} />
            <input type="password" placeholder="Confirm new password" value={confirmPw}
              onChange={e=>{setConfirmPw(e.target.value);clr();}} style={iS}
              onKeyDown={e=>e.key==="Enter"&&doReset()} />
            {error && <div style={{color:"#ef4444",fontSize:13,padding:"8px 10px",background:"#fee2e222",borderRadius:6}}>{error}</div>}
            {msg   && <div style={{color:"#10b981",fontSize:13,fontWeight:600}}>{msg}</div>}
            <button onClick={doReset} disabled={loading} style={{...bS,opacity:loading?.7:1}}>
              {loading ? "Updating…" : "Update Password"}
            </button>
          </div>
        )}

        {mode === "forgot" && (
          <div style={{display:"flex", flexDirection:"column", gap:14}}>
            <div style={{fontWeight:800, fontSize:20, marginBottom:2}}>Reset password</div>
            <div style={{color:"var(--muted)", fontSize:13}}>Enter your email and we'll send a reset link.</div>
            <input type="email" placeholder="you@email.com" value={email}
              onChange={e=>{setEmail(e.target.value);clr();}} style={iS}
              onKeyDown={e=>e.key==="Enter"&&doForgot()} />
            {error && <div style={{color:"#ef4444",fontSize:13,padding:"8px 10px",background:"#fee2e222",borderRadius:6}}>{error}</div>}
            {msg   && <div style={{color:"#10b981",fontSize:13,fontWeight:600}}>{msg}</div>}
            <button onClick={doForgot} disabled={loading} style={{...bS,opacity:loading?.7:1}}>
              {loading ? "Sending…" : "Send Reset Link"}
            </button>
            <div style={{textAlign:"center",marginTop:4}}>
              <button style={lS} onClick={()=>{setMode("login");clr();}}>← Back to login</button>
            </div>
          </div>
        )}

        {mode === "login" && (
          <div style={{display:"flex", flexDirection:"column", gap:14}}>
            <div style={{fontWeight:800, fontSize:20, marginBottom:2}}>Welcome back</div>
            <button onClick={()=>authSignInWithGoogle()} style={{width:"100%",padding:"11px",borderRadius:8,
              fontSize:14,fontWeight:600,background:"#fff",color:"#1f2937",border:"1px solid #d1d5db",
              cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,fontFamily:"inherit"}}>
              <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/>

}

// ─── PROFILE PAGE ─────────────────────────────────────────────────────────────
function ProfilePage({ user, onBack, onSignOut, dark, setDark }) {
  const [displayName, setDisplayName] = useState(user?.user_metadata?.display_name || "");
  const [saving, setSaving]   = useState(false);
  const [saved, setSaved]     = useState(false);
  const [profErr, setProfErr] = useState("");
  const [changingPw, setChangingPw] = useState(false);
  const [newPw, setNewPw]     = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [pwSaved, setPwSaved] = useState(false);
  const [pwErr, setPwErr]     = useState("");

  const initials = (() => {
    const n = displayName.trim();
    if (!n) return (user?.email || "?")[0].toUpperCase();
    const p = n.split(" ").filter(Boolean);
    return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : n.slice(0,2).toUpperCase();
  })();

  const saveProfile = async () => {
    setSaving(true); setProfErr(""); setSaved(false);
    const { error: e } = await authUpdateProfile({ display_name: displayName.trim() });
    setSaving(false);
    if (e) { setProfErr(e.message); return; }
    setSaved(true); setTimeout(() => setSaved(false), 2500);
  };

  const changePw = async () => {
    if (newPw.length < 8) { setPwErr("Password must be at least 8 characters."); return; }
    if (newPw !== confirmPw) { setPwErr("Passwords do not match."); return; }
    setSaving(true); setPwErr(""); setPwSaved(false);
    const { error: e } = await authUpdatePassword(newPw);
    setSaving(false);
    if (e) { setPwErr(e.message); return; }
    setPwSaved(true); setNewPw(""); setConfirmPw(""); setChangingPw(false);
    setTimeout(() => setPwSaved(false), 3000);
  };

  const iS = { width:"100%", padding:"10px 13px", borderRadius:8, fontSize:14,
    border:"1px solid var(--border)", background:"var(--input-bg)", color:"var(--text)", fontFamily:"inherit" };
  const card = { background:"var(--card)", border:"1px solid var(--border)", borderRadius:12, padding:24, marginBottom:14 };

  return (
    <div style={{maxWidth:540, margin:"0 auto", paddingBottom:40}}>
      <div style={{display:"flex", alignItems:"center", gap:12, margin:"20px 0 24px"}}>
        <button onClick={onBack} style={{background:"var(--card)", border:"1px solid var(--border)",
          borderRadius:8, padding:"8px 14px", color:"var(--text)", fontSize:13, cursor:"pointer", fontWeight:600}}>
          ← Back
        </button>
        <div style={{fontWeight:800, fontSize:18}}>Account & Profile</div>
      </div>

      {/* Avatar + info */}
      <div style={card}>
        <div style={{display:"flex", alignItems:"center", gap:16, marginBottom:20}}>
          <div style={{width:60, height:60, borderRadius:"50%", background:"var(--accent)", flexShrink:0,
            display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, fontWeight:800, color:"#fff"}}>
            {initials}
          </div>
          <div>
            <div style={{fontWeight:700, fontSize:15}}>{displayName || user?.email}</div>
            <div style={{color:"var(--muted)", fontSize:13}}>{user?.email}</div>
            <div style={{fontSize:11, color:"var(--muted)", marginTop:2}}>
              Member since {new Date(user?.created_at).toLocaleDateString("en-US",{month:"long",year:"numeric"})}
            </div>
          </div>
        </div>
        <div style={{display:"flex", flexDirection:"column", gap:10}}>
          <div>
            <label style={{fontSize:11, fontWeight:700, color:"var(--muted)", textTransform:"uppercase",
              letterSpacing:"0.06em", display:"block", marginBottom:4}}>Display Name</label>
            <input value={displayName} onChange={e=>setDisplayName(e.target.value)}
              placeholder="Your full name" style={iS} onKeyDown={e=>e.key==="Enter"&&saveProfile()} />
          </div>
          <div>
            <label style={{fontSize:11, fontWeight:700, color:"var(--muted)", textTransform:"uppercase",
              letterSpacing:"0.06em", display:"block", marginBottom:4}}>Email</label>
            <input value={user?.email || ""} disabled
              style={{...iS, opacity:0.55, cursor:"not-allowed"}} />
          </div>
          {profErr && <div style={{color:"#ef4444", fontSize:13}}>{profErr}</div>}
          {saved   && <div style={{color:"#10b981", fontSize:13, fontWeight:600}}>✓ Profile saved</div>}
          <button onClick={saveProfile} disabled={saving}
            style={{background:"var(--accent)", color:"#fff", border:"none", borderRadius:8,
              padding:"10px", fontSize:14, fontWeight:700, cursor:"pointer", opacity:saving?.7:1}}>
            {saving ? "Saving…" : "Save Profile"}
          </button>
        </div>
      </div>

      {/* Password */}
      <div style={card}>
        <div style={{fontWeight:700, fontSize:14, marginBottom:14}}>Password</div>
        {!changingPw
          ? <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <span style={{color:"var(--muted)", fontSize:13, letterSpacing:2}}>••••••••••</span>
              <button onClick={()=>setChangingPw(true)}
                style={{background:"var(--card)", border:"1px solid var(--border)", borderRadius:6,
                  padding:"7px 14px", fontSize:13, fontWeight:600, cursor:"pointer", color:"var(--text)"}}>
                Change
              </button>
            </div>
          : <div style={{display:"flex", flexDirection:"column", gap:10}}>
              <input type="password" placeholder="New password (min 8 chars)" value={newPw}
                onChange={e=>{setNewPw(e.target.value);setPwErr("");}} style={iS} />
              <input type="password" placeholder="Confirm new password" value={confirmPw}
                onChange={e=>{setConfirmPw(e.target.value);setPwErr("");}} style={iS}
                onKeyDown={e=>e.key==="Enter"&&changePw()} />
              {pwErr   && <div style={{color:"#ef4444", fontSize:13}}>{pwErr}</div>}
              {pwSaved && <div style={{color:"#10b981", fontSize:13, fontWeight:600}}>✓ Password updated</div>}
              <div style={{display:"flex", gap:8}}>
                <button onClick={changePw} disabled={saving}
                  style={{flex:1, background:"var(--accent)", color:"#fff", border:"none",
                    borderRadius:8, padding:"10px", fontSize:14, fontWeight:700, cursor:"pointer", opacity:saving?.7:1}}>
                  {saving ? "Updating…" : "Update Password"}
                </button>
                <button onClick={()=>{setChangingPw(false);setNewPw("");setConfirmPw("");setPwErr("");}}
                  style={{flex:1, background:"none", border:"1px solid var(--border)", borderRadius:8,
                    padding:"10px", fontSize:14, color:"var(--muted)", cursor:"pointer"}}>
                  Cancel
                </button>
              </div>
            </div>
        }
      </div>



      {/* Sign out */}
      <div style={card}>
        <div style={{fontWeight:700, fontSize:14, marginBottom:4}}>Sign Out</div>
        <div style={{color:"var(--muted)", fontSize:13, marginBottom:14}}>
          You'll need to sign back in to access your deals.
        </div>
        <button onClick={onSignOut}
          style={{background:"#fee2e2", color:"#991b1b", border:"1px solid #fca5a5",
            borderRadius:8, padding:"10px 20px", fontSize:14, fontWeight:700, cursor:"pointer"}}>
          Sign Out
        </button>
      </div>
    </div>
  );
}


// ─── SETTINGS PAGE ────────────────────────────────────────────────────────────
function SettingsPage({ prefs, onSave, onBack, deals, dark, setDark }) {
  const [local, setLocal] = useState({ ...DEFAULT_PREFS, ...prefs });
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  const set = (key, val) => setLocal(p => ({ ...p, [key]: val }));
  const setCC = (key, val) => setLocal(p => ({ ...p, closingCosts: { ...p.closingCosts, [key]: val } }));

  const handleSave = (applyToDeals) => {
    setSaving(true);
    onSave(local, applyToDeals);
    setSaving(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };


  const card  = { background:"var(--card)", border:"1px solid var(--border)", borderRadius:12, padding:24, marginBottom:14 };
  const iS    = { width:"100%", padding:"9px 12px", borderRadius:7, fontSize:14, border:"1px solid var(--border)", background:"var(--input-bg)", color:"var(--text)", fontFamily:"inherit" };
  const label = (txt) => <label style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em",display:"block",marginBottom:4}}>{txt}</label>;
  const row2  = { display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 };
  const row3  = { display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 };

  return (
    <div style={{maxWidth:600, margin:"0 auto", paddingBottom:40}}>
      <div style={{display:"flex", alignItems:"center", gap:12, margin:"20px 0 24px"}}>
        <button onClick={onBack} style={{background:"var(--card)", border:"1px solid var(--border)",
          borderRadius:8, padding:"8px 14px", color:"var(--text)", fontSize:13, cursor:"pointer", fontWeight:600}}>
          ← Back
        </button>
        <div>
          <div style={{fontWeight:800, fontSize:18}}>Global Assumptions</div>
          <div style={{fontSize:12, color:"var(--muted)", marginTop:2}}>Applied to every new deal you create</div>
        </div>
      </div>

      {/* ── Financing Defaults ───────────────────────────── */}
      <div style={card}>
        <div style={{fontWeight:700, fontSize:14, marginBottom:16}}>Financing</div>
        <div style={row3}>
          <div>
            {label("Down Payment %")}
            <input type="number" value={local.downPaymentPct} onChange={e=>set("downPaymentPct",+e.target.value)} style={iS} min={0} max={100}/>
          </div>
          <div>
            {label("Interest Rate %")}
            <input type="number" value={local.interestRate} onChange={e=>set("interestRate",+e.target.value)} style={iS} step={0.1}/>
          </div>
          <div>
            {label("Amortization (yrs)")}
            <input type="number" value={local.amortYears} onChange={e=>set("amortYears",+e.target.value)} style={iS}/>
          </div>
        </div>
      </div>

      {/* ── Income & Growth Defaults ─────────────────────── */}
      <div style={card}>
        <div style={{fontWeight:700, fontSize:14, marginBottom:16}}>Income & Growth</div>
        <div style={row2}>
          <div>
            {label("Vacancy Rate %")}
            <input type="number" value={local.vacancyRate} onChange={e=>set("vacancyRate",+e.target.value)} style={iS} min={0} max={100}/>
          </div>
          <div>
            {label("Rent Growth % / yr")}
            <input type="number" value={local.rentGrowth} onChange={e=>set("rentGrowth",+e.target.value)} style={iS} step={0.1}/>
          </div>
          <div>
            {label("Expense Growth % / yr")}
            <input type="number" value={local.expenseGrowth} onChange={e=>set("expenseGrowth",+e.target.value)} style={iS} step={0.1}/>
          </div>
          <div>
            {label("Appreciation % / yr")}
            <input type="number" value={local.appreciationRate} onChange={e=>set("appreciationRate",+e.target.value)} style={iS} step={0.1}/>
          </div>
        </div>
      </div>

      {/* ── Tax ─────────────────────────────────────────── */}
      <div style={card}>
        <div style={{fontWeight:700, fontSize:14, marginBottom:16}}>Tax</div>
        <div style={{maxWidth:180}}>
          {label("Income Tax Bracket %")}
          <input type="number" value={local.taxBracket} onChange={e=>set("taxBracket",+e.target.value)} style={iS} min={0} max={60}/>
        </div>
      </div>

      {/* ── Expense % Defaults ───────────────────────────── */}
      <div style={card}>
        <div style={{fontWeight:700, fontSize:14, marginBottom:4}}>Expense Defaults (%)</div>
        <div style={{fontSize:12, color:"var(--muted)", marginBottom:16}}>Used when expense mode is set to % of rent</div>
        <div style={row3}>
          <div>
            {label("Property Tax %")}
            <input type="number" value={local.propertyTaxPct} onChange={e=>set("propertyTaxPct",+e.target.value)} style={iS} step={0.1}/>
          </div>
          <div>
            {label("Insurance %")}
            <input type="number" value={local.insurancePct} onChange={e=>set("insurancePct",+e.target.value)} style={iS} step={0.1}/>
          </div>
          <div>
            {label("Maintenance %")}
            <input type="number" value={local.maintenancePct} onChange={e=>set("maintenancePct",+e.target.value)} style={iS} step={0.1}/>
          </div>
          <div>
            {label("CapEx %")}
            <input type="number" value={local.capexPct} onChange={e=>set("capexPct",+e.target.value)} style={iS} step={0.1}/>
          </div>
          <div>
            {label("Property Mgmt %")}
            <input type="number" value={local.propertyMgmtPct} onChange={e=>set("propertyMgmtPct",+e.target.value)} style={iS} step={0.1}/>
          </div>
        </div>
      </div>

      {/* ── Closing Costs ────────────────────────────────── */}
      <div style={card}>
        <div style={{fontWeight:700, fontSize:14, marginBottom:16}}>Closing Cost Defaults ($)</div>
        <div style={row3}>
          {[["title","Title & Escrow"],["transferTax","Transfer Tax"],["inspection","Inspection"],["attorney","Attorney"],["lenderFees","Lender Fees"]].map(([k,lbl])=>(
            <div key={k}>
              {label(lbl)}
              <input type="number" value={local.closingCosts[k]||0} onChange={e=>setCC(k,+e.target.value)} style={iS}/>
            </div>
          ))}
        </div>
      </div>

      {/* ── Red Flag Thresholds ──────────────────────────── */}
      <div style={card}>
        <div style={{fontWeight:700, fontSize:14, marginBottom:4}}>Red Flag Thresholds</div>
        <div style={{fontSize:12, color:"var(--muted)", marginBottom:16}}>Triggers warnings on the Red Flags tab</div>
        <div style={row3}>
          <div>
            {label("DSCR Floor (x)")}
            <input type="number" value={local.dscrFloor} onChange={e=>set("dscrFloor",+e.target.value)} style={iS} step={0.05}/>
          </div>
          <div>
            {label("Cap Rate Floor %")}
            <input type="number" value={(local.capRateFloor*100).toFixed(1)} onChange={e=>set("capRateFloor",+e.target.value/100)} style={iS} step={0.1}/>
          </div>
          <div>
            {label("Exp. Ratio Ceiling %")}
            <input type="number" value={(local.expRatioCeiling*100).toFixed(0)} onChange={e=>set("expRatioCeiling",+e.target.value/100)} style={iS}/>
          </div>
        </div>
      </div>

      {/* ── Actions ──────────────────────────────────────── */}
      <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:20,marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>Save Changes</div>
        <div style={{fontSize:13,color:"var(--muted)",marginBottom:16,lineHeight:1.6}}>
          Choose how to apply your updated assumptions.
          {deals?.length > 0 && <span> You have <strong style={{color:"var(--text)"}}>{(deals||[]).length} existing deal{(deals||[]).length!==1?"s":""}</strong>.</span>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={()=>handleSave(true)} disabled={saving}
            style={{background:"var(--accent)",color:"#fff",border:"none",borderRadius:8,
              padding:"12px 20px",fontSize:14,fontWeight:700,cursor:"pointer",textAlign:"left",
              opacity:saving?0.7:1,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>🔄</span>
            <div>
              <div>Push to All Deals</div>
              <div style={{fontSize:12,fontWeight:400,opacity:0.85}}>Updates financing, growth & tax assumptions on all existing deals</div>
            </div>
          </button>
          <button onClick={()=>handleSave(false)} disabled={saving}
            style={{background:"var(--card)",color:"var(--text)",border:"1px solid var(--accent)",borderRadius:8,
              padding:"12px 20px",fontSize:14,fontWeight:700,cursor:"pointer",textAlign:"left",
              opacity:saving?0.7:1,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>✨</span>
            <div>
              <div>Apply to New Deals Only</div>
              <div style={{fontSize:12,fontWeight:400,color:"var(--muted)"}}>Existing deals are unchanged — new deals start with these defaults</div>
            </div>
          </button>
          <button onClick={()=>setLocal({...DEFAULT_PREFS})}
            style={{background:"none",border:"1px solid var(--border)",borderRadius:8,
              padding:"12px 20px",fontSize:14,color:"var(--muted)",cursor:"pointer",textAlign:"left",
              display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>↩️</span>
            <div>
              <div>Reset to Defaults</div>
              <div style={{fontSize:12,fontWeight:400}}>Restore all values to system defaults (does not save)</div>
            </div>
          </button>
        </div>
        {saved && <div style={{color:"#10b981",fontSize:13,fontWeight:600,marginTop:12}}>✓ Settings saved</div>}
      </div>
    </div>
  );
}

function ShareDealModal({ deal, user, onClose, onShared }) {
  const [groups, setGroups]   = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [sharing, setSharing] = React.useState(false);
  const [selected, setSelected] = React.useState(null);
  const [msg, setMsg]         = React.useState(null);

  React.useEffect(() => {
    sbGetMyGroups()
      .then(g => {
        setGroups(g.filter(gr => gr.status === 'active' && gr.role !== 'Viewer'));
      })
      .catch(e => {
        setMsg('Could not load groups: ' + e.message);
      })
      .finally(() => setLoading(false));
  }, []);

  const handleShare = async () => {
    if (!selected) return;
    setSharing(true);
    try {
      await sbShareDealToGroup(deal, selected.id);
      onShared(selected.name);
    } catch(e) {
      setMsg('Failed to share: ' + e.message);
      setSharing(false);
    }
  };

  const overlay = {position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',display:'flex',
    alignItems:'center',justifyContent:'center',zIndex:2000,padding:16};
  const box = {background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,
    padding:28,maxWidth:400,width:'100%'};
  const btnPrimary = {background:'var(--accent)',color:'#fff',border:'none',borderRadius:8,
    padding:'10px 20px',fontSize:14,fontWeight:700,cursor:'pointer'};
  const btnGhost = {background:'none',border:'1px solid var(--border)',borderRadius:8,
    padding:'9px 16px',fontSize:13,color:'var(--muted)',cursor:'pointer'};

  return (
    <div style={overlay} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={box}>
        <div style={{fontWeight:800,fontSize:17,marginBottom:4}}>Share Deal</div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:18}}>
          {deal.address || 'Untitled Deal'}
        </div>

        {msg && <div style={{background:'#fee2e2',color:'#991b1b',borderRadius:8,
          padding:'8px 12px',marginBottom:12,fontSize:13}}>{msg}</div>}

        {loading ? (
          <div style={{color:'var(--muted)',padding:'20px 0',textAlign:'center'}}>Loading groups…</div>
        ) : groups.length === 0 ? (
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:32,marginBottom:10}}>👥</div>
            <div style={{fontWeight:600,marginBottom:6}}>No groups yet</div>
            <div style={{fontSize:13,color:'var(--muted)'}}>
              Create a group first via the profile menu → Deal Groups.
            </div>
          </div>
        ) : (
          <div style={{marginBottom:18}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',
              letterSpacing:'0.06em',marginBottom:10}}>Share to Group</div>
            {groups.map(g => (
              <div key={g.id}
                onClick={()=>setSelected(g)}
                style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',
                  borderRadius:8,marginBottom:6,cursor:'pointer',
                  border:`2px solid ${selected?.id===g.id ? 'var(--accent)' : 'var(--border)'}`,
                  background: selected?.id===g.id ? 'var(--accent)11' : 'var(--bg)'}}>
                <div style={{width:36,height:36,borderRadius:'50%',background:'#6366f1',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:16,color:'#fff',flexShrink:0}}>
                  {g.name[0].toUpperCase()}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{g.name}</div>
                  <div style={{fontSize:12,color:'var(--muted)'}}>{g.role}</div>
                </div>
                {selected?.id===g.id && <span style={{color:'var(--accent)',fontSize:18}}>✓</span>}
              </div>
            ))}
          </div>
        )}

        <div style={{display:'flex',gap:10}}>
          <button onClick={handleShare}
            disabled={!selected||sharing||groups.length===0}
            style={{...btnPrimary, opacity:(!selected||sharing)?0.5:1}}>
            {sharing ? 'Sharing…' : 'Share Deal'}
          </button>
          <button onClick={onClose} style={btnGhost}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function GroupsPage({ user, dark, onBack, onSelectGroup }) {
  const [groups, setGroups]           = React.useState([]);
  const [pending, setPending]         = React.useState([]);
  const [loading, setLoading]         = React.useState(true);
  const [showCreate, setShowCreate]   = React.useState(false);
  const [showInvite, setShowInvite]   = React.useState(null); // groupId
  const [showMembers, setShowMembers] = React.useState(null); // group obj
  const [members, setMembers]         = React.useState([]);
  const [newName, setNewName]         = React.useState('');
  const [newDesc, setNewDesc]         = React.useState('');
  const [inviteEmail, setInviteEmail] = React.useState('');
  const [inviteRole, setInviteRole]   = React.useState('Editor');
  const [msg, setMsg]                 = React.useState(null);
  const [saving, setSaving]           = React.useState(false);

  const flash = (text, ok=true) => { setMsg({text,ok}); setTimeout(()=>setMsg(null),3000); };

  const reload = async () => {
    setLoading(true);
    try {
      const [g, p] = await Promise.all([sbGetMyGroups(), sbGetPendingInvites()]);
      setGroups(g); setPending(p);
    } catch(e) {
      console.error('Groups load error:', e);
      flash('Could not load groups — check Supabase tables are created.', false);
    }
    setLoading(false);
  };
  React.useEffect(() => { reload(); }, []);

  const handleCreate = async () => {
    if (!newName.trim()) return;
    setSaving(true);
    try {
      await sbCreateGroup(newName.trim(), newDesc.trim());
      setNewName(''); setNewDesc(''); setShowCreate(false);
      flash('Group created!');
      reload();
    } catch(e) { flash(e.message, false); }
    setSaving(false);
  };

  const handleInvite = async () => {
    if (!inviteEmail.trim()) return;
    setSaving(true);
    try {
      const res = await sbInviteMember(showInvite, inviteEmail.trim(), inviteRole);
      setInviteEmail('');
      flash(res.pending ? "Invite saved — they'll see it when they join." : "Invite sent!");
      if (showMembers) {
        const m = await sbGetGroupMembers(showMembers.id);
        setMembers(m);
      }
    } catch(e) { flash(e.message, false); }
    setSaving(false);
  };

  const handleRespond = async (groupId, accept) => {
    await sbRespondToInvite(groupId, accept);
    flash(accept ? 'Joined group!' : 'Invite declined');
    reload();
  };

  const handleLeave = async (groupId) => {
    if (!confirm('Leave this group? You will lose access to shared deals.')) return;
    await sbLeaveGroup(groupId);
    flash('Left group');
    reload();
  };

  const openMembers = async (group) => {
    setShowMembers(group);
    const m = await sbGetGroupMembers(group.id);
    setMembers(m);
  };

  const handleRoleChange = async (groupId, memberId, newRole) => {
    await sbUpdateMemberRole(groupId, memberId, newRole);
    const m = await sbGetGroupMembers(groupId);
    setMembers(m);
  };

  const handleRemoveMember = async (groupId, memberId) => {
    if (!confirm('Remove this member?')) return;
    await sbRemoveMember(groupId, memberId);
    const m = await sbGetGroupMembers(groupId);
    setMembers(m);
  };

  const card  = { background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, padding:20, marginBottom:12 };
  const iS    = { width:'100%', padding:'9px 12px', borderRadius:7, fontSize:14, border:'1px solid var(--border)', background:'var(--input-bg)', color:'var(--text)', fontFamily:'inherit', marginBottom:10 };
  const btnPrimary = { background:'var(--accent)', color:'#fff', border:'none', borderRadius:8, padding:'10px 20px', fontSize:14, fontWeight:700, cursor:'pointer' };
  const btnGhost   = { background:'none', border:'1px solid var(--border)', borderRadius:8, padding:'9px 16px', fontSize:13, color:'var(--muted)', cursor:'pointer' };

  const ROLE_COLORS = { Owner:'#6366f1', Editor:'#10b981', Viewer:'#94a3b8', pending:'#f59e0b' };

  return (
    <div style={{minHeight:'100vh', background:'var(--bg)', color:'var(--text)'}}>
      <div style={{maxWidth:640, margin:'0 auto', padding:'0 16px 60px'}}>

        {/* Header */}
        <div style={{display:'flex', alignItems:'center', gap:12, margin:'20px 0 24px'}}>
          <button onClick={onBack} style={btnGhost}>← Back</button>
          <div style={{fontWeight:800, fontSize:18}}>Deal Groups</div>
          <div style={{marginLeft:'auto'}}>
            <button onClick={()=>setShowCreate(true)} style={btnPrimary}>+ New Group</button>
          </div>
        </div>

        {msg && (
          <div style={{background: msg.ok ? '#d1fae5' : '#fee2e2', color: msg.ok ? '#065f46' : '#991b1b',
            borderRadius:8, padding:'10px 14px', marginBottom:14, fontSize:13, fontWeight:600}}>
            {msg.text}
          </div>
        )}

        {/* Pending invites */}
        {pending.length > 0 && (
          <div style={{...card, border:'1px solid #f59e0b', background:'#fffbeb'}}>
            <div style={{fontWeight:700, fontSize:13, color:'#92400e', marginBottom:12}}>
              📬 Pending Invites ({pending.length})
            </div>
            {pending.map(inv => (
              <div key={inv.group_id} style={{display:'flex', justifyContent:'space-between', alignItems:'center',
                padding:'10px 0', borderBottom:'1px solid #fde68a'}}>
                <div>
                  <div style={{fontWeight:700, fontSize:14}}>{inv.groups?.name}</div>
                  <div style={{fontSize:12, color:'#92400e', marginTop:2}}>
                    Invited as <strong>{inv.role}</strong>
                    {inv.groups?.description && ` · ${inv.groups.description}`}
                  </div>
                </div>
                <div style={{display:'flex', gap:8}}>
                  <button onClick={()=>handleRespond(inv.group_id, true)}
                    style={{...btnPrimary, padding:'7px 14px', fontSize:13}}>Accept</button>
                  <button onClick={()=>handleRespond(inv.group_id, false)}
                    style={{...btnGhost, padding:'7px 14px', fontSize:13}}>Decline</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Group list */}
        {loading ? (
          <div style={{textAlign:'center', padding:40, color:'var(--muted)'}}>Loading groups…</div>
        ) : groups.length === 0 && pending.length === 0 ? (
          <div style={{textAlign:'center', padding:'60px 20px'}}>
            <div style={{fontSize:48, marginBottom:16}}>👥</div>
            <div style={{fontWeight:700, fontSize:16, marginBottom:8}}>No groups yet</div>
            <div style={{color:'var(--muted)', fontSize:14, marginBottom:20}}>
              Create a group to share deals with partners, co-investors, or your team.
            </div>
            <button onClick={()=>setShowCreate(true)} style={btnPrimary}>Create Your First Group</button>
          </div>
        ) : (
          groups.filter(g=>g.status==='active').map(group => (
            <div key={group.id} style={card}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:4}}>
                    <div style={{fontWeight:800, fontSize:15}}>{group.name}</div>
                    <span style={{fontSize:11, fontWeight:700, color:ROLE_COLORS[group.role]||'var(--muted)',
                      background:'var(--bg)', border:`1px solid ${ROLE_COLORS[group.role]||'var(--border)'}`,
                      borderRadius:20, padding:'2px 8px'}}>{group.role}</span>
                  </div>
                  {group.description && <div style={{fontSize:13, color:'var(--muted)'}}>{group.description}</div>}
                </div>
              </div>
              <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                <button onClick={()=>onSelectGroup(group)}
                  style={{...btnPrimary, padding:'8px 16px', fontSize:13}}>
                  📂 Open Deals
                </button>
                <button onClick={()=>openMembers(group)}
                  style={{...btnGhost, padding:'8px 16px', fontSize:13}}>
                  👥 Members
                </button>
                {(group.role === 'Owner' || group.role === 'Editor') && (
                  <button onClick={()=>{ setShowInvite(group.id); setInviteEmail(''); }}
                    style={{...btnGhost, padding:'8px 16px', fontSize:13}}>
                    + Invite
                  </button>
                )}
                {group.role !== 'Owner' && (
                  <button onClick={()=>handleLeave(group.id)}
                    style={{...btnGhost, padding:'8px 16px', fontSize:13, color:'#ef4444'}}>
                    Leave
                  </button>
                )}
              </div>
            </div>
          ))
        )}

        {/* ── Create Group Modal ── */}
        {showCreate && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',
            alignItems:'center',justifyContent:'center',zIndex:1000,padding:16}}
            onClick={e=>{if(e.target===e.currentTarget)setShowCreate(false);}}>
            <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:28,maxWidth:420,width:'100%'}}>
              <div style={{fontWeight:800,fontSize:17,marginBottom:16}}>Create a Group</div>
              <input style={iS} placeholder="Group name (e.g. Smith Family Investments)"
                value={newName} onChange={e=>setNewName(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&handleCreate()}/>
              <textarea style={{...iS,height:80,resize:'vertical'}}
                placeholder="Description (optional)"
                value={newDesc} onChange={e=>setNewDesc(e.target.value)}/>
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>
                You'll be the Owner. Invite others after creating.
              </div>
              <div style={{display:'flex',gap:10}}>
                <button onClick={handleCreate} disabled={!newName.trim()||saving} style={btnPrimary}>
                  {saving?'Creating…':'Create Group'}
                </button>
                <button onClick={()=>setShowCreate(false)} style={btnGhost}>Cancel</button>
              </div>
            </div>
          </div>
        )}

        {/* ── Invite Modal ── */}
        {showInvite && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',
            alignItems:'center',justifyContent:'center',zIndex:1000,padding:16}}
            onClick={e=>{if(e.target===e.currentTarget)setShowInvite(null);}}>
            <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:28,maxWidth:420,width:'100%'}}>
              <div style={{fontWeight:800,fontSize:17,marginBottom:16}}>Invite to Group</div>
              <input style={iS} type="email" placeholder="Email address"
                value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)}/>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',
                  letterSpacing:'0.06em',marginBottom:8}}>Role</div>
                {['Editor','Viewer'].map(r=>(
                  <label key={r} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,cursor:'pointer'}}>
                    <input type="radio" name="inviteRole" checked={inviteRole===r}
                      onChange={()=>setInviteRole(r)} style={{accentColor:'var(--accent)'}}/>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:ROLE_COLORS[r]}}>{r}</div>
                      <div style={{fontSize:12,color:'var(--muted)'}}>
                        {r==='Editor'?'Can add, edit, and analyze deals':'Can view deals and analysis — cannot edit'}
                      </div>
                    </div>
                  </label>
                ))}
              </div>
              <div style={{display:'flex',gap:10}}>
                <button onClick={handleInvite} disabled={!inviteEmail.trim()||saving} style={btnPrimary}>
                  {saving?'Sending…':'Send Invite'}
                </button>
                <button onClick={()=>setShowInvite(null)} style={btnGhost}>Cancel</button>
              </div>
            </div>
          </div>
        )}

        {/* ── Members Panel ── */}
        {showMembers && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',
            alignItems:'center',justifyContent:'center',zIndex:1000,padding:16}}
            onClick={e=>{if(e.target===e.currentTarget)setShowMembers(null);}}>
            <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,
              padding:28,maxWidth:460,width:'100%',maxHeight:'80vh',overflowY:'auto'}}>
              <div style={{fontWeight:800,fontSize:17,marginBottom:4}}>{showMembers.name}</div>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>Members</div>
              {members.map(m => {
                const isMe = m.user_id === user?.id;
                const name = m.profiles?.display_name || m.profiles?.email || m.user_id?.slice(0,8)+'…';
                const isOwner = showMembers.role === 'Owner';
                return (
                  <div key={m.user_id} style={{display:'flex',alignItems:'center',gap:10,
                    padding:'10px 0',borderBottom:'1px solid var(--border-faint)'}}>
                    <div style={{width:34,height:34,borderRadius:'50%',background:'var(--accent)',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:13,fontWeight:700,color:'#fff',flexShrink:0}}>
                      {(m.profiles?.display_name||m.profiles?.email||'?')[0].toUpperCase()}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:600}}>{name}{isMe&&' (you)'}</div>
                      <div style={{fontSize:12,color:'var(--muted)'}}>{m.profiles?.email}</div>
                    </div>
                    {m.status==='pending' && (
                      <span style={{fontSize:11,fontWeight:700,color:'#92400e',background:'#fef3c7',
                        borderRadius:20,padding:'2px 8px'}}>Pending</span>
                    )}
                    {isOwner && !isMe ? (
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <select value={m.role}
                          onChange={e=>handleRoleChange(showMembers.id, m.user_id, e.target.value)}
                          style={{fontSize:12,padding:'4px 8px',borderRadius:6,border:'1px solid var(--border)',
                            background:'var(--input-bg)',color:ROLE_COLORS[m.role]||'var(--text)',fontWeight:700,
                            fontFamily:'inherit'}}>
                          {['Owner','Editor','Viewer'].map(r=><option key={r} value={r}>{r}</option>)}
                        </select>
                        <button onClick={()=>handleRemoveMember(showMembers.id, m.user_id)}
                          style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:16,padding:'0 4px'}}>
                          ×
                        </button>
                      </div>
                    ) : (
                      <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:20,
                        color:ROLE_COLORS[m.role]||'var(--muted)',border:`1px solid ${ROLE_COLORS[m.role]||'var(--border)'}`,
                        background:'var(--bg)'}}>
                        {m.role}
                      </span>
                    )}
                  </div>
                );
              })}
              {(showMembers.role === 'Owner' || showMembers.role === 'Editor') && (
                <div style={{marginTop:14}}>
                  <div style={{display:'flex',gap:8}}>
                    <input style={{...iS,margin:0,flex:1}} type="email" placeholder="Invite by email"
                      value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)}/>
                    <select value={inviteRole} onChange={e=>setInviteRole(e.target.value)}
                      style={{padding:'9px 10px',borderRadius:7,fontSize:13,border:'1px solid var(--border)',
                        background:'var(--input-bg)',color:'var(--text)',fontFamily:'inherit'}}>
                      <option>Editor</option><option>Viewer</option>
                    </select>
                    <button onClick={()=>{setShowInvite(showMembers.id); handleInvite();}}
                      style={{...btnPrimary,padding:'9px 14px',fontSize:13,whiteSpace:'nowrap'}}
                      disabled={!inviteEmail.trim()}>
                      Invite
                    </button>
                  </div>
                </div>
              )}
              <button onClick={()=>setShowMembers(null)} style={{...btnGhost,marginTop:14,width:'100%'}}>Close</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function OnboardingTour({ onClose, onDone }) {
  const [step, setStep] = useState(0);
  const total = TOUR_STEPS.length;
  const s = TOUR_STEPS[step];
  const isLast = step === total - 1;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",
      alignItems:"center",justifyContent:"center",zIndex:2000,padding:16}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:18,
        padding:"36px 32px",maxWidth:460,width:"100%",position:"relative",
        boxShadow:"0 24px 64px rgba(0,0,0,0.5)"}}>

        {/* Close */}
        <button onClick={onClose} style={{position:"absolute",top:14,right:16,background:"none",
          border:"none",color:"var(--muted)",fontSize:20,cursor:"pointer",lineHeight:1}}>✕</button>

        {/* Step indicator */}
        <div style={{display:"flex",gap:5,marginBottom:24,justifyContent:"center"}}>
          {TOUR_STEPS.map((_,i)=>(
            <div key={i} onClick={()=>setStep(i)} style={{height:3,flex:1,borderRadius:2,cursor:"pointer",
              background:i<=step?"var(--accent)":"var(--border)",transition:"background 0.2s"}}/>
          ))}
        </div>

        {/* Content */}
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:48,marginBottom:16,lineHeight:1}}>{s.icon}</div>
          <div style={{fontWeight:800,fontSize:19,marginBottom:10,lineHeight:1.3}}>{s.title}</div>
          <div style={{color:"var(--muted)",fontSize:15,lineHeight:1.7}}>{s.body}</div>
        </div>

        {/* Navigation */}
        <div style={{display:"flex",gap:10,alignItems:"center",justifyContent:"space-between"}}>
          <button onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0}
            style={{background:"none",border:"1px solid var(--border)",borderRadius:8,
              padding:"10px 18px",fontSize:14,cursor:step===0?"not-allowed":"pointer",
              color:"var(--muted)",opacity:step===0?0.4:1}}>
            ← Back
          </button>
          <span style={{fontSize:12,color:"var(--muted)"}}>{step+1} of {total}</span>
          {isLast
            ? <button onClick={onDone} style={{background:"var(--accent)",color:"#fff",border:"none",
                borderRadius:8,padding:"10px 22px",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                Get Started →
              </button>
            : <button onClick={()=>setStep(s=>s+1)} style={{background:"var(--accent)",color:"#fff",
                border:"none",borderRadius:8,padding:"10px 22px",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                Next →
              </button>
          }
        </div>
      </div>
    </div>
  );
}

function App() {
  const [dark, setDark] = useState(true);
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [showProfile, setShowProfile] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showAppSettings, setShowAppSettings] = useState(false);
  const [showTour, setShowTour] = useState(false);
  const [showGroups, setShowGroups] = useState(false);
  const [activeGroup, setActiveGroup] = useState(null); // {id, name, role} or null = personal
  const [groupDeals, setGroupDeals] = useState([]);
  const [showShareModal, setShowShareModal] = useState(null); // deal to share
  const [profileMenuOpen, setProfileMenuOpen] = useState(false);
  const [prefs, setPrefs] = useState(DEFAULT_PREFS);
  const [deals, setDeals] = useState(null);
  const [activeDealId, setActiveDealId] = useState(null);
  const [syncStatus, setSyncStatus] = useState("idle");
  const [syncError, setSyncError] = useState("");
  const [lastSyncedAt, setLastSyncedAt] = useState(null);
  const [portfolioFilter, setPortfolioFilter] = useState("All");
  const syncTimer = useRef(null);
  const lastCloudUpdate = useRef(null);
  const isOnline = useOnlineStatus();

  // Bootstrap: restore session from localStorage on mount, then listen for changes
  useEffect(() => {
    authGetSession().then(({ data: { session } }) => {
      const u = session?.user || false;
      setUser(u);
      setAuthLoading(false);
      if (u) {
        // Show user-scoped local cache immediately (empty array for new users / new devices)
        const local = loadLocal(u.id);
        setDeals(local);
        // Always fetch from cloud — cloud is source of truth, local is just a cache
        setTimeout(() => {
          sbRead()
            .then(({ data: cloudDeals, updated_at }) => {
              lastCloudUpdate.current = updated_at;
              if (data.prefs) { const p = { ...DEFAULT_PREFS, ...data.prefs }; setPrefs(p); window.__userPrefs = p; }
              if (cloudDeals.length > 0) {
                setDeals(cloudDeals);
                saveLocal(cloudDeals, u.id);
              } else if (local.length > 0) {
                // First login on new device — push cached local up to cloud
                sbWrite(local).catch(() => {});
              } else {
                // Brand new user — show onboarding tour
                setShowTour(true);
              }
              // New user with no data anywhere — stays as empty array, correct
            })
            .catch(() => {}); // keep local cache on network error
        }, 300);
      }
    });
    const { data: { subscription } } = sbClient.auth.onAuthStateChange((evt, session) => {
      const u = session?.user || false;
      setUser(u);
      if (u && (evt === "SIGNED_IN" || evt === "USER_UPDATED")) {
        // Clean up hash after Supabase has processed it
        if (window.location.hash.includes("access_token")) {
          window.history.replaceState(null, "", window.location.pathname);
        }
        // Use user-scoped local cache — never bleed another user's data
        const local = loadLocal(u.id);
        setDeals(local);
        setTimeout(() => {
          sbRead()
            .then(({ data: cloudDeals, updated_at }) => {
              lastCloudUpdate.current = updated_at;
              if (cloudDeals.length > 0) { setDeals(cloudDeals); saveLocal(cloudDeals, u.id); }
              else if (local.length > 0) { sbWrite(local).catch(() => {}); }
            })
            .catch(() => {});
        }, 300);
      }
      if (!u) { setDeals([]); setActiveDealId(null); setShowProfile(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  // Re-pull from cloud when tab regains visibility or window is focused (cross-device sync)
  useEffect(() => {
    const pull = () => {
      if (!user || !isOnline || syncStatus === "saving") return;
      sbRead()
        .then(({ data: cloudDeals, updated_at }) => {
          // If updated_at isn't available, always apply cloud data to stay safe
          if (updated_at && updated_at === lastCloudUpdate.current) return;
          lastCloudUpdate.current = updated_at;
          setDeals(cloudDeals);
          saveLocal(cloudDeals, user?.id);
          setSyncStatus("saved");
          setLastSyncedAt(new Date());
          setTimeout(() => setSyncStatus("idle"), 2000);
        })
        .catch(() => {});
    };
    const onVisible = () => { if (document.visibilityState === "visible") pull(); };
    document.addEventListener("visibilitychange", onVisible);
    window.addEventListener("focus", pull);
    return () => {
      document.removeEventListener("visibilitychange", onVisible);
      window.removeEventListener("focus", pull);
    };
  }, [isOnline, syncStatus]);

  useEffect(() => {
    if (deals === null || !user) return;
    saveLocal(deals, user?.id);
    if (!isOnline) { setSyncStatus("offline"); return; }
    clearTimeout(syncTimer.current);
    setSyncStatus("saving");
    syncTimer.current = setTimeout(async () => {
      try {
        await sbWrite(deals);
        setSyncStatus("saved");
        setSyncError("");
        setLastSyncedAt(new Date());
        setTimeout(() => setSyncStatus("idle"), 2000);
      } catch(e) { setSyncStatus("error"); setSyncError(e.message); }
    }, 800);
  }, [deals, isOnline]);

  // Re-attempt sync when coming back online
  useEffect(() => {
    if (isOnline && syncStatus === "offline" && deals !== null) {
      sbWrite(deals)
        .then(() => { setSyncStatus("saved"); setLastSyncedAt(new Date()); setTimeout(() => setSyncStatus("idle"), 2000); })
        .catch(e => { setSyncStatus("error"); setSyncError(e.message); });
    }
  }, [isOnline]);

  const addDeal      = () => { const d=newDeal(prefs); setDeals(p=>[...p,d]); setActiveDealId(d.id); };
  const updateDeal   = useCallback((u) => { setDeals(p=>p.map(d=>d.id===u.id?u:d)); }, []);
  const deleteDeal   = (id) => setDeals(p=>p.filter(d=>d.id!==id));
  const reorderDeals = useCallback((next) => { setDeals(next); }, []);
  const activeDeal   = deals?.find(d=>d.id===activeDealId);

  const handleSignOut = async () => {
    await authSignOut();
    setDeals(null); setActiveDealId(null);
    setShowProfile(false); setShowSettings(false); setShowAppSettings(false); setShowGroups(false); setActiveGroup(null); setGroupDeals([]); setProfileMenuOpen(false);
    setPrefs(DEFAULT_PREFS);

  };

  // Load group deals when switching to a group context
  React.useEffect(() => {

  const saveGroupDeals = React.useCallback((updated) => {

  const forceRefresh = () => {
    setSyncStatus("saving");
    sbRead()
      .then(({ data: cloudDeals, updated_at }) => {
        lastCloudUpdate.current = updated_at;
        setDeals(cloudDeals);
        saveLocal(cloudDeals);
        setSyncStatus("saved");

  const D = dark ? {

  } : {

  const syncBadge = syncStatus==="saving"  ? { label:"Syncing…",       color:"#f59e0b" }

                        👤 My Profile
                      </button>
                      <button onClick={handleSignOut}
                        style={{display:"block",width:"100%",textAlign:"left",padding:"10px 14px",
                          background:"none",border:"none",color:"#ef4444",fontSize:13,
                          cursor:"pointer",fontFamily:"inherit",borderTop:"1px solid var(--border)"}}>
                        ↩ Sign Out
                      </button>
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
      </div>
      <div style={{padding:"18px 16px 0"}}>
        {!activeDeal
          ?(!deals ? <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"var(--muted)",fontSize:14}}>Loading…</div></div> : <PortfolioPage
              deals={activeGroup ? groupDeals : deals}
              onSelect={id=>setActiveDealId(id)}
              onAdd={activeGroup
                ? ()=>{ const d=newDeal(prefs); saveGroupDeals([...(groupDeals||[]),d]); setActiveDealId(d.id); }
                : addDeal}
              onDelete={activeGroup
                ? (id)=>saveGroupDeals((groupDeals||[]).filter(d=>d.id!==id))
                : deleteDeal}
              onExport={()=>exportPortfolioCSV(activeGroup ? groupDeals : deals)}
              onReorder={activeGroup
                ? (neo)=>saveGroupDeals(neo)
                : reorderDeals}
              dark={dark} setDark={setDark}
              filterState={[portfolioFilter,setPortfolioFilter]}
              onTour={()=>setShowTour(true)}
              onOpenGroups={()=>setShowGroups(true)}
              activeGroup={activeGroup}
              onExitGroup={()=>setActiveGroup(null)}
              onShareDeal={(deal)=>setShowShareModal(deal)}
            />)
          :<DealPage
              deal={activeDeal}
              onUpdate={activeGroup
                ? (u)=>saveGroupDeals((groupDeals||[]).map(d=>d.id===u.id?u:d))
                : updateDeal}
              onBack={()=>setActiveDealId(null)}
              onExport={()=>exportDealCSV(activeDeal)}
              onShare={()=>setShowShareModal(activeDeal)}
              groupRole={activeGroup?.role}
            />
        }
        {showTour && <OnboardingTour onClose={()=>setShowTour(false)} onDone={()=>setShowTour(false)}/>}
        {showShareModal && (
          <ShareDealModal
            deal={showShareModal}
            user={user}
            onClose={()=>setShowShareModal(null)}
            onShared={(groupName)=>{
              setShowShareModal(null);
              alert(`Deal shared to "${groupName}" successfully.`);
            }}
          />
        )}
      </div>
    </div>
  </>);
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
